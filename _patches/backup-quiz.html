  // ---------- Redis (deep dive) ----------
  {id:"q1ffp", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"HI Redis deep dive: out of the box, what does Redis do when it hits its memory limit?",
    options:["Evicts least-recently-used keys (allkeys-lru)","REJECTS new writes — you must configure an eviction policy for a cache","Crashes the node","Spills to disk automatically"],
    correct:[1],
    why:"Default is noeviction: writes error once memory is full. TTL handles staleness, not memory pressure — for a cache you set allkeys-lru (which Redis approximates by sampling, not exact ordering)."},
  {id:"ql0ep", topic:"Redis", diff:"tricky", level:"Staff", type:"single",
    q:"HI: in Redis Cluster, what happens if a client asks the wrong node for a key?",
    options:["The node forwards the request for you","The node replies MOVED pointing at the right node; the client refreshes its slot-to-node map","The key is created on that node","The cluster rebalances immediately"],
    correct:[1],
    why:"Each key hashes to one of 16384 slots; clients cache the slot→node map. Ask the wrong node and you get a MOVED reply (nodes gossip the full map but won't forward), so clients aim for the right node first."},
  {id:"qao6s", topic:"Redis", diff:"tricky", level:"Staff", type:"single",
    q:"HI: how do you force two related Redis keys (user:123:posts and user:123:likes) into the same slot?",
    options:["They always land together by default","Hash tags — only the part inside {braces} is hashed, e.g. {user:123}:posts","Use the SAME command for both","Disable clustering"],
    correct:[1],
    why:"Only the substring inside {braces} is hashed, so {user:123}:posts and {user:123}:likes share a slot and can be used together in a MULTI transaction. Cluster multi-key ops only work within one slot."},
  {id:"q128q", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"HI: why is single-node Redis NOT a system of record, even with a replica?",
    options:["It can't store enough data","Replication is asynchronous — the primary acks before the replica sees the write, so failover can drop the last acked writes","It has no persistence at all","Reads are too slow"],
    correct:[1],
    why:"Async replication means a promoted replica may never have seen the last acknowledged writes. Combined with the persistence loss windows (RDB/AOF), acknowledged writes can vanish — so don't make Redis the source of truth."},
  {id:"q1451", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"HI: a Redis fixed-window rate limiter does INCR then EXPIRE. What's the subtle bug to avoid?",
    options:["INCR is not atomic","Calling EXPIRE on every request keeps pushing the reset forward — set the TTL only when INCR returns 1 (first request of the window)","EXPIRE must run before INCR","You must use a separate key per request"],
    correct:[1],
    why:"If you EXPIRE on every call, steady traffic never gets a fresh window. Set expiry only when INCR returns 1, and run INCR+EXPIRE as one Lua script so a crash between them can't leave a counter that never resets."},
  {id:"q1u7b", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"HI: the correct way to RELEASE a Redis lock (SET key token NX EX 30) is…",
    options:["Just DEL the key","Check the key still holds YOUR token, then DEL — as one atomic Lua script","Let it expire only","SET the key to unlocked"],
    correct:[1],
    why:"Your lock may have expired and been re-acquired by someone else; a blind DEL would delete their lock. Check-token-then-DEL must run atomically (Lua) on Redis's single thread."},
  {id:"qw5la", topic:"Redis", diff:"tricky", level:"Staff", type:"single",
    q:"HI: the standard defense against a paused client acting after its Redis lock expired is…",
    options:["A longer TTL","A fencing token (monotonically increasing) that the storage layer checks — Redis has nothing built in for this","Redlock alone","More replicas"],
    correct:[1],
    why:"Treat a Redis lock as an efficiency tool that occasionally fails. For correctness, use fencing tokens or a consensus system (ZooKeeper/etcd); often a DB row lock (SELECT ... FOR UPDATE) or conditional UPDATE ... WHERE version=X replaces the distributed lock entirely."},
  {id:"qsa76", topic:"Redis", diff:"tricky", level:"Staff", type:"single",
    q:"HI: the old 'Redis Pub/Sub doesn't scale in a cluster' complaint is outdated because…",
    options:["Pub/Sub now persists messages","Since Redis 7, sharded Pub/Sub (SPUBLISH/SSUBSCRIBE) routes each channel to the shard that owns its slot, so capacity scales","Pub/Sub uses one connection per channel now","It was never true"],
    correct:[1],
    why:"Classic cluster Pub/Sub broadcast every message to every node (no added capacity). Sharded Pub/Sub since Redis 7 hashes each channel to a slot. Also: connections are per node, not per channel."},
  {id:"qqwok", topic:"Redis", diff:"tricky", level:"Senior", type:"multi",
    q:"HI: remediations for a Redis hot-key problem? (select all)",
    options:["Client-side caching of the hottest keys (short TTL)","Key copies — store under product:123:1..10 so copies hash to different nodes","Read replicas (only if clients are configured for replica reads)","Read replicas to fix a WRITE-hot key"],
    correct:[0,1,2],
    why:"Client-side cache, key copies, and read replicas all spread read load. But replicas do nothing for a write-hot key — every write still lands on the one primary that owns the slot."},
  {id:"qww1x", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"HI: a Redis Stream work queue can process an item twice. Why, and what's the fix?",
    options:["Bug in XADD; upgrade Redis","Redis can't tell a slow worker from a dead one, so XCLAIM may re-run a pending entry — make processing idempotent","Streams don't persist; add RDB","Use Pub/Sub instead"],
    correct:[1],
    why:"Consumer groups track pending entries by idle time; when a worker seems dead, another XCLAIMs the entry — but a slow worker looks the same as a dead one, so delivery is at-least-once. Make consumers idempotent."},

  // ---------- Networking / API / Data Modeling / DB Indexing (deep dives) ----------
  {id:"q8yds", topic:"Networking", diff:"basic", level:"Mid", type:"single",
    q:"In the OSI model as framed by HI, which protocol lives at the Transport Layer (Layer 4)?",
    options:["IP","TCP","HTTP","DNS"],
    correct:[1],
    why:"HI places IP at Layer 3 (Network), TCP/UDP/QUIC at Layer 4 (Transport), and HTTP/WebSockets/DNS/WebRTC at Layer 7 (Application)."},
  {id:"q6zk8", topic:"Networking", diff:"tricky", level:"Senior", type:"single",
    q:"HI Networking deep dive: a New York to London round trip (~5,600 km) has a theoretical minimum latency of roughly…",
    options:["About 1ms","About 56ms","About 200ms","About 500ms"],
    correct:[1],
    why:"Light in fiber travels at about 2/3 c (~200,000 km/s), so the ~5,600 km round trip floors near 56ms before any processing, versus under 1ms to a nearby server."},
  {id:"q6pna", topic:"Networking", diff:"tricky", level:"Senior", type:"single",
    q:"HI: why are L4 load balancers generally preferred for WebSocket connections over L7?",
    options:["L4 can inspect HTTP headers to route by cookie","L4 maintains a persistent TCP connection between client and server, as if they were directly connected","L4 terminates the connection and opens a new one to the backend","L4 is more CPU-intensive and therefore more reliable"],
    correct:[1],
    why:"L4 maintains persistent TCP connections (suits WebSockets). L7 terminates connections and inspects content, the opposite behavior."},
  {id:"qarv8", topic:"Networking", diff:"tricky", level:"Senior", type:"multi",
    q:"Per HI, which statements about failures and retries are accurate? (select all)",
    options:["'Retry with exponential backoff' is the magic phrase interviewers want","Backoff should include jitter so clients don't all retry at once","Idempotent APIs make retries safe, often via an idempotency key","Circuit breakers should retry immediately and indefinitely until recovery"],
    correct:[0,1,2],
    why:"HI calls 'retry with exponential backoff' the magic phrase, stresses jitter, and idempotency keys for safe write retries. Circuit breakers do the OPPOSITE of retrying indefinitely — they trip open and fail fast."},
  {id:"qw0x3", topic:"Networking", diff:"basic", level:"Mid", type:"single",
    q:"What does HI say about QUIC for interviews?",
    options:["It fully replaces TCP and should always be used","Treat it as a better version of TCP but without the same broad baseline of adoption","It is a Layer 3 routing protocol","It is only used for peer-to-peer video via STUN and TURN"],
    correct:[1],
    why:"HI: consider QUIC a better TCP but lacking TCP's broad adoption; some performance-minded interviewers like QUIC/HTTP3 knowledge, but most want your time elsewhere."},

  {id:"qer9f", topic:"API design", diff:"basic", level:"Mid", type:"single",
    q:"Per HI, which HTTP API style is your go-to default unless you have a specific reason otherwise?",
    options:["GraphQL","REST","gRPC","WebSockets"],
    correct:[1],
    why:"HI: default to REST; it covers 90% of use cases. If unsure, say 'I'll use REST APIs' and move on."},
  {id:"qhzjs", topic:"API design", diff:"tricky", level:"Senior", type:"multi",
    q:"Per HI, which HTTP methods are idempotent? (select all)",
    options:["GET","PUT","DELETE","POST"],
    correct:[0,1,2],
    why:"HI: GET, PUT, DELETE are idempotent. POST/PATCH are not guaranteed idempotent — which matters when networks fail and clients retry (you don't want duplicate bookings)."},
  {id:"q2llq", topic:"API design", diff:"tricky", level:"Senior", type:"single",
    q:"HI's biggest GraphQL gotcha: a client queries 100 events each with its venue. What goes wrong?",
    options:["Over-fetching, returning 100x more data than needed","The N+1 problem: roughly 101 DB queries instead of 2","Under-fetching, forcing 100 client round trips","Schema drift causing 100 versioning conflicts"],
    correct:[1],
    why:"HI calls it the N+1 problem: 1 query for events + N for each venue = 101 instead of 2. Fix with batching/dataloader."},
  {id:"q1374", topic:"API design", diff:"tricky", level:"Senior", type:"single",
    q:"HI: path parameter vs query parameter — when to use which?",
    options:["Path for optional filters, query for required identifiers","Path when the value is required to identify the resource; query for optional filters","Always query params, easier to test","Path only for POST bodies"],
    correct:[1],
    why:"HI ties it to required vs optional: path/nested resource when required (/events/{id}/tickets), query for optional filters (/tickets?event_id=123&section=VIP)."},
  {id:"qiuxi", topic:"API design", diff:"basic", level:"Mid", type:"single",
    q:"HI's recommendation on API versioning in interviews?",
    options:["Header versioning, keeps URLs clean","URL versioning (/v1/events) — widely understood and easy to explain quickly","Semantic versioning in the request body","Never mention versioning"],
    correct:[1],
    why:"HI recommends URL versioning as the safer interview choice; their own breakdowns omit it only because most interviewers don't care, not because it's unimportant."},

  {id:"q1xeu", topic:"Data Modeling", diff:"basic", level:"Mid", type:"single",
    q:"HI Data Modeling: default database recommendation in an interview?",
    options:["A graph database like Neo4j for relationship-heavy data","A relational DB, specifically PostgreSQL, unless requirements clearly signal otherwise","A document DB like MongoDB for flexibility","A key-value store like Redis as source of truth"],
    correct:[1],
    why:"HI: resist exotic databases; most of the time the right answer is relational, and it specifically recommends PostgreSQL unless you have strong opinions."},
  {id:"qhxhz", topic:"Data Modeling", diff:"tricky", level:"Senior", type:"single",
    q:"HI warns graph databases are a common mistake. What point does it make?",
    options:["Neo4j can't model many-to-many","Even Facebook models its social graph with MySQL, so SQL is good enough for your interview","Graph DBs can't enforce foreign keys","Graph DBs are slower than key-value stores for traversals"],
    correct:[1],
    why:"HI: even Facebook models its social graph on MySQL, and LinkedIn/Twitter use SQL for core relationship data — graph DBs usually add needless complexity."},
  {id:"qxper", topic:"Data Modeling", diff:"tricky", level:"Senior", type:"single",
    q:"HI: why is time-range sharding usually an anti-pattern for write-heavy systems?",
    options:["Time ranges can't be partition keys","All current writes hit the same shard (the latest range), creating a hot shard","It makes recent-posts queries impossible","Foreign keys break across time-based shards"],
    correct:[1],
    why:"HI: time-range sharding sends all current writes to the latest-range shard (hot shard). It works better for archival/analytics where writes spread out."},
  {id:"q3eq1", topic:"Data Modeling", diff:"tricky", level:"Senior", type:"multi",
    q:"Per HI, the three factors that drive schema design decisions? (select all)",
    options:["Data volume","Access patterns","Consistency requirements","Backend programming language"],
    correct:[0,1,2],
    why:"HI: everything flows from data volume, access patterns (the most important), and consistency requirements. Backend language is not one of them."},
  {id:"q14bk", topic:"Data Modeling", diff:"basic", level:"Mid", type:"single",
    q:"HI advice on primary keys when defining entities?",
    options:["Use business data like emails so keys are human-readable","Use system-generated IDs (user_id) rather than business data, since they stay stable when business rules change","Always use composite keys from multiple columns","Avoid primary keys in NoSQL designs"],
    correct:[1],
    why:"HI: use system-generated IDs (user_id, post_id) over business data like email, because system keys stay stable even when business rules change."},

  {id:"q1gw6", topic:"Database Indexing", diff:"basic", level:"Mid", type:"single",
    q:"HI: how is main table data typically stored on disk before any index is added?",
    options:["A balanced B-tree","A heap file — rows in no particular order","A hash table keyed by primary key","An LSM tree sorted by timestamp"],
    correct:[1],
    why:"HI describes the main table as a heap file: a collection of rows in no particular order, like a notebook where you write entries as they come."},
  {id:"q1hic", topic:"Database Indexing", diff:"tricky", level:"Senior", type:"single",
    q:"HI: the classic case where indexes hurt more than help?",
    options:["Frequent reads, infrequent writes","Frequent writes, infrequent reads — like a logging table","Any table over a million rows","A table queried only by primary key"],
    correct:[1],
    why:"HI cites write-heavy, read-light tables (logging) where index maintenance overhead isn't justified; also tiny tables where a sequential scan beats traversing an index."},
  {id:"qra8i", topic:"Database Indexing", diff:"tricky", level:"Senior", type:"multi",
    q:"Per HI, which statements about B-tree indexes are correct? (select all)",
    options:["Nodes can have hundreds of children, unlike a binary tree's two","Each node is sized to fit a single disk page (about 8KB)","Finding id=350 in Postgres might read only 2-3 pages from disk","B-trees handle only equality, not range queries"],
    correct:[0,1,2],
    why:"HI: B-tree nodes have hundreds of children, fit a ~8KB page, and a lookup may read only 2-3 pages (root, maybe internal, leaf). B-trees handle BOTH equality and range — last option is false."},
  {id:"qne40", topic:"Database Indexing", diff:"tricky", level:"Senior", type:"single",
    q:"HI: random vs sequential access on modern SSDs?",
    options:["They're now equally fast on SSDs","Random access is still significantly slower than sequential, even on SSDs — a common misconception","Sequential is slower on SSDs than HDDs","SSDs eliminate the need for indexes"],
    correct:[1],
    why:"HI flags as a misconception that SSDs equalize access; random is still much slower than sequential (far worse on HDDs), making proper indexing critical."},
  {id:"qkfz9", topic:"Database Indexing", diff:"basic", level:"Mid", type:"single",
    q:"HI: what cost does every index impose on writes?",
    options:["Writes become impossible until the index is dropped","A single write may trigger several disk writes, since every index must also be updated","Indexes only cost space, never write speed","Writes get faster because the index caches the row"],
    correct:[1],
    why:"HI: on insert/update the DB updates the main table plus every index, so multiple indexes mean a single write triggers several disk writes, plus extra disk space."},

  // ---------- Caching / Sharding / Consistent Hashing / CAP / Numbers (deep dives) ----------
  {id:"q1on2", topic:"Caching", diff:"basic", level:"Mid", type:"single",
    q:"Per HI, roughly what latency win does reading a profile from Redis give over Postgres?",
    options:["About 5x (10ms to 2ms)","About 50x (50ms to 1ms)","About 2x (4ms to 2ms)","About 500x"],
    correct:[1],
    why:"HI: Postgres ~50ms vs Redis ~1ms, a 50x improvement, because memory sits closer to the CPU and avoids disk."},
  {id:"q1vdu", topic:"Caching", diff:"tricky", level:"Senior", type:"single",
    q:"HI: the primary risk of write-behind (write-back) caching?",
    options:["Writes get very slow (both cache and DB must confirm)","If the cache crashes before flushing, you can lose data","It pollutes the cache with never-read data","Every read needs a directory lookup"],
    correct:[1],
    why:"Write-behind writes only to cache and flushes to the DB asynchronously — fast writes, but data loss if the cache crashes before flushing. Suits workloads tolerant of occasional loss."},
  {id:"q45qu", topic:"Caching", diff:"tricky", level:"Senior", type:"single",
    q:"HI: cache warming only prevents stampedes under which condition?",
    options:["When using request coalescing","When you use TTL-based expiration (not invalidation on writes)","When the cache is in-process","When you replicate hot keys"],
    correct:[1],
    why:"HI: warming refreshes popular keys before they expire, which only helps with TTL-based expiration. If you invalidate on writes instead, warming doesn't prevent stampedes."},
  {id:"qw18x", topic:"Caching", diff:"basic", level:"Mid", type:"single",
    q:"HI: the single most effective way to handle a cache stampede?",
    options:["Increase TTL to several hours","Request coalescing / single-flight — one request rebuilds while others wait","Switch to write-through","Shard the cache across more nodes"],
    correct:[1],
    why:"HI calls request coalescing (single-flight) the most effective fix: one request rebuilds the entry while others wait, instead of hundreds hitting the DB."},
  {id:"qx7el", topic:"Caching", diff:"tricky", level:"Senior", type:"multi",
    q:"Per HI, which statements about caching patterns/layers are correct? (select all)",
    options:["Cache-aside is the interview default","Redis natively supports write-through out of the box","CDNs are a form of read-through cache","In-process caching is an optimization layer added AFTER an external cache"],
    correct:[0,2,3],
    why:"HI: cache-aside is the default, CDNs are read-through, in-process caching comes after external. It explicitly says Redis does NOT natively support write-through — app code/framework is needed."},

  {id:"q1tmp", topic:"Sharding", diff:"basic", level:"Mid", type:"single",
    q:"HI: even powerful cloud databases max out around a storage ceiling that forces sharding. What number does HI cite for Amazon Aurora?",
    options:["256 GiB","2.5 TB","256 TiB","16 TB"],
    correct:[2],
    why:"HI: even Aurora maxes out around 256 TiB — the kind of ceiling that forces splitting data across machines."},
  {id:"q15lp", topic:"Sharding", diff:"tricky", level:"Senior", type:"single",
    q:"HI: what distinguishes partitioning from sharding?",
    options:["Partitioning spans machines; sharding stays on one","Partitioning splits data within a single DB instance; sharding splits across multiple machines","They're identical with no difference","Partitioning is NoSQL-only; sharding SQL-only"],
    correct:[1],
    why:"HI: partitioning usually means splitting within one instance (ranges/hash); sharding means across machines. Terms are used loosely — what matters is one machine vs many."},
  {id:"q9zs9", topic:"Sharding", diff:"tricky", level:"Senior", type:"single",
    q:"HI: why is is_premium (a boolean) a bad shard key?",
    options:["Booleans can't be hashed","Only two values means at most two shards, with uneven load","It needs a directory lookup per request","It changes on upgrade, forcing resharding"],
    correct:[1],
    why:"HI's canonical bad shard key: low cardinality (two values) caps you at two shards, and if most users are free, one shard is overloaded. Good keys need high cardinality + even distribution."},
  {id:"qznlo", topic:"Sharding", diff:"basic", level:"Mid", type:"single",
    q:"HI: which sharding strategy will interviewers assume unless you say otherwise?",
    options:["Range-based","Hash-based","Directory-based","Vertical partitioning"],
    correct:[1],
    why:"HI labels hash-based sharding the default and most common; it's what your interviewer assumes unless you explicitly state otherwise."},
  {id:"q1del", topic:"Sharding", diff:"tricky", level:"Staff", type:"multi",
    q:"Per HI, which are valid ways to handle hot spots or cross-shard problems? (select all)",
    options:["Isolate hot keys to a dedicated shard","Use compound shard keys like hash(user_id + date)","Default to two-phase commit for all cross-shard writes","Denormalize related data to keep it on one shard"],
    correct:[0,1,3],
    why:"HI recommends isolating hot keys, compound keys, and denormalizing. It warns AGAINST 2PC as the go-to (slow, fragile) — prefer sagas or avoiding cross-shard transactions."},

  {id:"qu89t", topic:"Consistent Hashing", diff:"basic", level:"Mid", type:"single",
    q:"HI: what core problem does consistent hashing solve vs simple modulo hashing?",
    options:["It eliminates hot keys entirely","It minimizes data redistribution when adding/removing a node","It removes the need for a hash function","It guarantees strong consistency"],
    correct:[1],
    why:"HI: modulo hashing (%3 to %4) remaps almost every key; consistent hashing moves only a bounded fraction when membership changes."},
  {id:"quto9", topic:"Consistent Hashing", diff:"tricky", level:"Senior", type:"single",
    q:"HI hash-ring example: how do you find which database an event maps to?",
    options:["hash(event_id) modulo node count","Hash the event ID to a point on the ring, then move clockwise to the next DB node","Look it up in a directory table","Assign to the lowest-load node"],
    correct:[1],
    why:"HI: place nodes on the ring, hash the event ID to a point, move clockwise to the next node — avoiding modulo and limiting movement on membership change."},
  {id:"qcqpp", topic:"Consistent Hashing", diff:"tricky", level:"Senior", type:"single",
    q:"HI: what problem do virtual nodes specifically solve?",
    options:["Hot keys from popular content","When a node fails, its whole load dumps on its single clockwise neighbor, overloading it","The need for replication","Making the ring larger than 2^32"],
    correct:[1],
    why:"HI: without virtual nodes a failed node's load shifts entirely to one neighbor (doubling it). Virtual nodes place each DB at many ring points so failure load spreads evenly."},
  {id:"qpk9k", topic:"Consistent Hashing", diff:"tricky", level:"Staff", type:"multi",
    q:"Per HI, which statements about consistent hashing in real systems are correct? (select all)",
    options:["Virtual nodes fix structural imbalance; replication/key-salting fix workload imbalance","Redis Cluster uses consistent hashing with virtual nodes","Redis Cluster uses fixed hash slots — 16,384 via CRC16(key) mod 16384","DynamoDB replicates each partition across 3 AZs, so a primary failure promotes a replica with no data movement"],
    correct:[0,2,3],
    why:"HI: virtual nodes fix key-distribution imbalance while replication/salting fix traffic imbalance; Redis Cluster uses fixed slots (NOT consistent hashing); DynamoDB replicates partitions across 3 AZs so failover moves no data."},

  {id:"q1muv", topic:"CAP / PACELC", diff:"basic", level:"Staff", type:"single",
    q:"HI: CAP theorem practically reduces to which single choice?",
    options:["SQL vs NoSQL","Consistency vs availability when a network partition occurs","Shard vs replicate","Strong vs eventual durability"],
    correct:[1],
    why:"HI: partition tolerance is non-negotiable in any distributed system, so CAP boils down to — prioritize consistency or availability when a partition occurs?"},
  {id:"q1lty", topic:"CAP / PACELC", diff:"tricky", level:"Staff", type:"single",
    q:"HI USA/Europe profile example during a partition: which choice and why?",
    options:["Consistency — a stale name is unacceptable","Availability — showing the old name beats showing an error","Consistency — profiles are financial data","Reject both reads and writes until healed"],
    correct:[1],
    why:"HI: for the profile example the answer is clear — show the stale old name (availability) rather than an error; a stale name beats no name."},
  {id:"q1yuh", topic:"CAP / PACELC", diff:"tricky", level:"Staff", type:"multi",
    q:"Per HI, which should prioritize CONSISTENCY over availability? (select all)",
    options:["Ticket/seat booking (prevent double-booking)","Viewing a Yelp restaurant's hours","E-commerce inventory (prevent overselling)","Stock trading order books"],
    correct:[0,2,3],
    why:"HI lists ticket booking, inventory, and financial/trading as consistency-required. Yelp showing slightly outdated hours is an availability example — brief staleness is fine."},
  {id:"q1qg1", topic:"CAP / PACELC", diff:"tricky", level:"Staff", type:"single",
    q:"HI: the model where users always see their own updates immediately, but others may see older versions, is…",
    options:["Causal consistency","Strong consistency","Read-your-own-writes consistency","Eventual consistency"],
    correct:[2],
    why:"HI: read-your-own-writes — common in social media so users see their own profile edits right away, even if others briefly see stale data."},
  {id:"q6wvd", topic:"CAP / PACELC", diff:"basic", level:"Staff", type:"single",
    q:"HI: the default consistency model of most distributed databases when prioritizing availability?",
    options:["Strong consistency","Causal consistency","Eventual consistency","Read-your-own-writes"],
    correct:[2],
    why:"HI: eventual consistency is the most relaxed model and the default of most distributed databases — what you implicitly choose when prioritizing availability."},

  {id:"qjc2e", topic:"Numbers to Know", diff:"basic", level:"Mid", type:"single",
    q:"HI: a common giveaway that a candidate has only book knowledge is…",
    options:["Not knowing CAP","Doing scale math with outdated hardware numbers (2015/2020) that underestimate modern systems","Failing to mention sharding","Using Redis for caching"],
    correct:[1],
    why:"HI: relying on outdated hardware constraints leads to over-engineered designs — one of the biggest tells of book-only knowledge."},
  {id:"q19qq", topic:"Numbers to Know", diff:"tricky", level:"Senior", type:"single",
    q:"HI 2026 numbers: roughly how much RAM does a high-memory instance like AWS U-24tb1.metal provide?",
    options:["512 GiB","4 TB","24 TB","60 TB"],
    correct:[2],
    why:"HI cites U-24tb1.metal at 24 TB RAM (X1e.32xlarge 4 TB, M6i.32xlarge 512 GiB) — many apps that once needed distributed systems now fit on one machine."},
  {id:"qpzry", topic:"Numbers to Know", diff:"tricky", level:"Senior", type:"single",
    q:"HI network latency tiers: approximate latency across availability zones within the same region?",
    options:["Sub-1ms","1-2ms","50-150ms","250-300ms"],
    correct:[1],
    why:"HI: sub-1ms within a single AZ, 1-2ms across AZs in a region, 50-150ms cross-region."},
  {id:"q1eap", topic:"Numbers to Know", diff:"basic", level:"Mid", type:"single",
    q:"HI: how is object storage like S3 characterized as a constraint?",
    options:["Limited to ~60 TB per bucket","Effectively unlimited — petabyte-scale is standard practice","Capped at 256 TiB like Aurora","Only for cold archival data"],
    correct:[1],
    why:"HI: S3 is effectively unlimited (petabyte-scale standard); the days of storage being a primary constraint are largely behind us."},
  {id:"q8pxe", topic:"Numbers to Know", diff:"tricky", level:"Senior", type:"multi",
    q:"Which 2026 hardware figures does HI specifically cite? (select all)",
    options:["i3en.24xlarge ~60 TB local SSD","D3en.12xlarge ~336 TB HDD","Within a datacenter, 25 Gbps is common","A single Postgres instance should be sharded at 100GB"],
    correct:[0,1,2],
    why:"HI cites i3en.24xlarge 60 TB SSD, D3en.12xlarge 336 TB HDD, 25 Gbps datacenter networking. It explicitly criticizes the textbook 'split at 100GB' as obsolete."},

  // ---------- Elasticsearch / Kafka / API Gateway (deep dives) ----------
  {id:"q1jo6", topic:"Elasticsearch", diff:"basic", level:"Mid", type:"single",
    q:"HI: what core problem is Elasticsearch presented as solving?",
    options:["Durable message streaming between services","Full-text search and querying over large volumes of data","Strongly consistent transactional writes","Distributed locking and coordination"],
    correct:[1],
    why:"HI frames Elasticsearch around search/querying over big data via inverted indexes — not a queue, lock service, or transactional store."},
  {id:"q1qho", topic:"Elasticsearch", diff:"basic", level:"Mid", type:"single",
    q:"HI: the relationship between an Elasticsearch index, shards, and Lucene?",
    options:["An index is a single Lucene file shared across nodes","An index is split into shards, and each shard is a self-contained Lucene index","Shards are read replicas of one master Lucene instance","Index and shard are two names for the same thing"],
    correct:[1],
    why:"HI: an index is partitioned into shards for horizontal scaling, and each shard is itself a complete Lucene index that can live on a different node."},
  {id:"qlbk2", topic:"Elasticsearch", diff:"tricky", level:"Senior", type:"single",
    q:"HI: why must you choose the number of primary shards carefully up front?",
    options:["Primary shard count can't change without reindexing into a new index","Adding primary shards auto-rebalances at zero cost","Shard count only affects read latency","Elasticsearch picks it automatically, unconfigurable"],
    correct:[0],
    why:"HI: primary shard count is fixed at index creation; changing it requires reindexing into a new index — a common gotcha interviewers probe."},
  {id:"qcgjh", topic:"Elasticsearch", diff:"tricky", level:"Senior", type:"single",
    q:"HI: the common anti-pattern with Elasticsearch is using it as…",
    options:["A search layer alongside a primary DB","The single primary datastore / source of truth","A tool for autocomplete and fuzzy matching","A store backed by inverted indexes"],
    correct:[1],
    why:"HI: Elasticsearch should generally not be your source of truth — keep a separate primary DB and sync ES as a secondary search index."},
  {id:"q1dit", topic:"Elasticsearch", diff:"tricky", level:"Senior", type:"multi",
    q:"Per HI, valid ways to keep Elasticsearch in sync with a primary DB? (select all)",
    options:["Change Data Capture (CDC) streaming DB changes","Application-level dual writes to both stores","A periodic full table scan as the only real-time mechanism","Clients writing directly to ES, bypassing the DB"],
    correct:[0,1],
    why:"HI presents CDC and dual writes as the standard sync strategies. A periodic scan isn't real-time sync, and bypassing the primary DB contradicts the source-of-truth pattern."},
  {id:"qd3nz", topic:"Elasticsearch", diff:"basic", level:"Mid", type:"single",
    q:"HI: which structure makes Elasticsearch efficient for full-text search?",
    options:["A B-tree keyed on document ID","An inverted index mapping terms to the documents containing them","A consistent hash ring","A skip list of timestamps"],
    correct:[1],
    why:"HI: the inverted index maps each term to the documents containing it, enabling fast full-text search, unlike a B-tree keyed on IDs."},

  {id:"q8gnc", topic:"Kafka vs Queues", diff:"basic", level:"Mid", type:"single",
    q:"HI Kafka deep dive: how is a topic distinguished from a partition?",
    options:["A topic is physical storage; a partition is a logical label","A topic is a logical grouping; a partition is the physical, ordered append-only log","They're identical concepts","A partition can span multiple topics"],
    correct:[1],
    why:"HI: a topic is a logical grouping of messages; a partition is the physical ordered immutable append-only log. A topic can have many partitions across brokers."},
  {id:"q1x5l", topic:"Kafka vs Queues", diff:"basic", level:"Mid", type:"single",
    q:"HI: how does a Kafka consumer group ensure each event is normally processed once?",
    options:["Every consumer reads every partition and deduplicates","Each partition is assigned to exactly one consumer in the group","Kafka randomly load-balances each message","The producer decides which consumer handles each message"],
    correct:[1],
    why:"HI: within a consumer group each partition is assigned to exactly one consumer, so under normal operation each event goes to a single consumer."},
  {id:"qk2e8", topic:"Kafka vs Queues", diff:"tricky", level:"Senior", type:"single",
    q:"HI single-broker capacity estimate on good hardware?",
    options:["~100GB data and 100K msgs/sec","~1TB data and ~1M msgs/sec","~10TB data and 10M msgs/sec","~500GB data and 50K msgs/sec"],
    correct:[1],
    why:"HI's hand-wavy but useful estimate: a single broker stores ~1TB and handles up to ~1M messages/sec — used to decide whether scaling is even needed."},
  {id:"qp353", topic:"Kafka vs Queues", diff:"tricky", level:"Senior", type:"single",
    q:"HI: how is a Kafka message routed to a partition by default?",
    options:["partition = hash(key) % num_partitions using murmur2","Round-robin regardless of key","By timestamp modulo partition count","By the broker with the lowest load"],
    correct:[0],
    why:"HI: partition = hash(key) % num_partitions with murmur2 (the default). A bad key causes hot partitions."},
  {id:"q9zg0", topic:"Kafka vs Queues", diff:"tricky", level:"Staff", type:"multi",
    q:"Per HI, strategies for handling a hot partition (e.g. the Nike LeBron ad)? (select all)",
    options:["Random salting of the partition key","Compound key such as ad ID plus region","Storing the full payload blob directly in Kafka","Back pressure to slow the producer"],
    correct:[0,1,3],
    why:"HI lists no-key default partitioning, random salting, compound keys, and back pressure. Storing large blobs in Kafka is an anti-pattern, not a fix."},
  {id:"q7ktc", topic:"Kafka vs Queues", diff:"tricky", level:"Senior", type:"single",
    q:"HI: which feature does Kafka NOT natively support that AWS SQS does?",
    options:["Message ordering within a partition","Built-in consumer retries and dead letter queues","Durable replication across brokers","Offset tracking for consumers"],
    correct:[1],
    why:"HI: Kafka has no out-of-the-box consumer retry support — you build your own retry topic + DLQ. That's why the Web Crawler breakdown chose SQS, which provides them natively."},

  {id:"q1owz", topic:"API Gateway", diff:"basic", level:"Mid", type:"single",
    q:"HI: the core, primary function of an API Gateway that candidates often forget?",
    options:["Authentication","Request routing to the appropriate backend service","Response caching","SSL termination"],
    correct:[1],
    why:"HI: candidates emphasize middleware but forget the core reason — request routing: deciding which backend handles each incoming request."},
  {id:"qf2z8", topic:"API Gateway", diff:"basic", level:"Mid", type:"single",
    q:"HI request flow: when does the gateway perform request validation?",
    options:["After routing to the backend","Before anything else, as the first step","Only after caching the response","Never — validation is the backend's job"],
    correct:[1],
    why:"HI lists validation first, so malformed requests (bad JSON, missing API key) are rejected early without wasting backend resources."},
  {id:"qjopq", topic:"API Gateway", diff:"tricky", level:"Senior", type:"single",
    q:"HI: the two load-balancing dimensions around an API Gateway?",
    options:["Client-to-gateway via a dedicated LB (ELB/NGINX); gateway-to-service done by the gateway itself","The gateway always handles client-to-gateway balancing internally","Load balancing is never associated with gateways","Backend services balance themselves; the gateway never does"],
    correct:[0],
    why:"HI separates client-to-gateway balancing (a dedicated LB like ELB/NGINX in front) from gateway-to-service balancing (the gateway distributing across backend instances)."},
  {id:"q19vp", topic:"API Gateway", diff:"tricky", level:"Senior", type:"single",
    q:"HI: what responses are appropriate to cache at the API Gateway?",
    options:["Highly user-specific responses to personalize per user","Frequently accessed data that changes infrequently and is NOT user specific","Every response — caching is always safe","Only error responses"],
    correct:[1],
    why:"HI: gateway caching fits frequently accessed, infrequently changing, non-user-specific data where the same input returns the same result."},
  {id:"qebq4", topic:"API Gateway", diff:"basic", level:"Mid", type:"single",
    q:"HI bottom line: when to introduce an API Gateway?",
    options:["Always, even for a simple client-server app","For microservices; skip it for a simple monolithic / single-client architecture","Only when you need a database cache","Only for systems with fewer than three services"],
    correct:[1],
    why:"HI: use a gateway with microservices, but it's overkill for simple monolithic or single-client systems."},
  {id:"qbgy3", topic:"API Gateway", diff:"tricky", level:"Senior", type:"single",
    q:"HI: how should you handle the API Gateway when speaking in an interview?",
    options:["Detail its full middleware pipeline","Briefly say it handles routing and basic middleware, then move on","Replace it with a message queue","Model it as the source of truth"],
    correct:[1],
    why:"HI stresses the gateway is thin and not the interesting part; the bigger risk is over-spending time — note routing + middleware and move on."},

  // ---------- Cassandra / DynamoDB / PostgreSQL (deep dives) ----------
  {id:"q1j4u", topic:"Cassandra", diff:"basic", level:"Mid", type:"single",
    q:"HI: what storage structure gives Cassandra its high write throughput, replacing the B-tree?",
    options:["A Log Structured Merge Tree (LSM tree)","A skip list","An inverted index","A hash table with chaining"],
    correct:[0],
    why:"HI: Cassandra uses an LSM tree instead of a B-tree, favoring write speed by treating most writes as append-only (Memtable then immutable SSTable)."},
  {id:"q1diu", topic:"Cassandra", diff:"basic", level:"Mid", type:"single",
    q:"HI: the purpose of a clustering key within a Cassandra primary key?",
    options:["It picks which partition the row lives in","It determines the sorted order of rows within a partition","It enforces referential integrity across tables","It encrypts the row at rest"],
    correct:[1],
    why:"HI: a primary key is partition key(s) + clustering key(s). The partition key picks the partition; the clustering key sets sorted order within it (e.g. Discord ORDER BY message_id DESC)."},
  {id:"q1t70", topic:"Cassandra", diff:"tricky", level:"Senior", type:"single",
    q:"HI: with replication factor 3, why does QUORUM for both reads and writes guarantee a read sees the latest write?",
    options:["QUORUM forces all 3 replicas to respond","QUORUM needs 2 of 3 each, so read and write sets always share at least one node","QUORUM routes every request to a single leader","QUORUM disables eventual consistency cluster-wide"],
    correct:[1],
    why:"QUORUM = majority (n/2+1). For 3 nodes that's 2, so write touches 2 and read touches 2 of 3, guaranteeing at least one overlapping node that has seen the write."},
  {id:"qcwkm", topic:"Cassandra", diff:"tricky", level:"Staff", type:"single",
    q:"HI: why did Discord add a bucket (fixed 10-day window) to the partition key of their Cassandra messages table?",
    options:["To support JOINs between channels and authors","To stop busy-channel partitions growing unbounded and hitting large-partition problems","To enable strong consistency for reads","To reduce SSTables created during compaction"],
    correct:[1],
    why:"HI: partitioning only by channel_id let busy channels grow monotonically into large-partition problems. The 10-day bucket caps partition size and rolls over, while recent reads still hit one partition."},
  {id:"q7602", topic:"Cassandra", diff:"tricky", level:"Staff", type:"multi",
    q:"HI: which are true about how Cassandra handles writes and deletes? (select all)",
    options:["A delete is recorded as a tombstone rather than removing data in place","Writes go to the commit log, then the Memtable, then later flush to an immutable SSTable","Each write updates the existing row in place inside the SSTable on disk","Compaction consolidates SSTables and removes tombstoned rows"],
    correct:[0,1,3],
    why:"HI: deletes are tombstones; writes hit the commit log (WAL) then the Memtable, later flushed to an immutable SSTable. SSTables are immutable (no in-place updates); compaction merges SSTables and purges tombstones."},
  {id:"q90lo", topic:"Cassandra", diff:"basic", level:"Staff", type:"single",
    q:"HI: how do Cassandra nodes share cluster state (which nodes are alive, the schema)?",
    options:["A central ZooKeeper coordinator","A peer-to-peer gossip protocol biased toward seed nodes","A primary leader broadcasting to followers","A shared SQL metadata table"],
    correct:[1],
    why:"HI: Cassandra uses peer-to-peer gossip with a bias toward seed nodes (guaranteed hotspots) so info reaches the whole cluster and no sub-clusters form. No single coordinator."},

  {id:"qsvbq", topic:"DynamoDB", diff:"basic", level:"Mid", type:"single",
    q:"HI: maximum size of a single DynamoDB item, including all attributes?",
    options:["64KB","256KB","400KB","1MB"],
    correct:[2],
    why:"HI: each item has a primary key and can hold up to 400KB of data including all attributes."},
  {id:"q4zal", topic:"DynamoDB", diff:"tricky", level:"Senior", type:"single",
    q:"HI: how do you choose eventual vs strong consistency for a DynamoDB read?",
    options:["A table-level setting fixed at creation","Per-request via ConsistentRead=true on the read call","Automatically by item size","Globally per AWS region"],
    correct:[1],
    why:"HI: not table-level. Set ConsistentRead=true per GetItem/Query/Scan. Strong reads hit the leader, cost 2x the RCU (1 RCU/4KB vs 0.5), and aren't supported on GSIs."},
  {id:"qjac3", topic:"DynamoDB", diff:"tricky", level:"Senior", type:"multi",
    q:"HI: which correctly distinguish a GSI from an LSI in DynamoDB? (select all)",
    options:["A GSI can use a different partition key; an LSI must share the base table partition key","GSIs support only eventually consistent reads; LSIs also support strong reads","LSIs can be added or removed any time; GSIs must be defined at table creation","An LSI is co-located on the base table's partitions; a GSI lives on separate partitions"],
    correct:[0,1,3],
    why:"HI: GSIs use a different partition key, live on separate partitions, eventual-only. LSIs share the partition key, are co-located, support strong reads, but must be defined at table creation (the reversed claim is wrong)."},
  {id:"q1foo", topic:"DynamoDB", diff:"tricky", level:"Senior", type:"single",
    q:"HI: using ProjectionExpression to return only a few attributes primarily saves what?",
    options:["RCU cost — only projected attributes are read from storage","Network bandwidth only; the full item is still read and full RCU charged","Storage cost — unprojected attributes aren't persisted","Nothing — it's unsupported"],
    correct:[1],
    why:"HI: unlike SQL column selection, ProjectionExpression only cuts network bandwidth. The full item is still read and you pay full RCU on its total size — which is why large items should be normalized."},
  {id:"q158k", topic:"DynamoDB", diff:"basic", level:"Mid", type:"single",
    q:"HI: roughly how many read/write capacity units does a single DynamoDB partition support?",
    options:["~3,000 RCUs and ~1,000 WCUs","~1,000 RCUs and ~3,000 WCUs","~10,000 RCUs and ~10,000 WCUs","Unlimited — no per-partition ceiling"],
    correct:[0],
    why:"HI: ~3,000 RCUs and ~1,000 WCUs per partition (~12MB/s reads, ~1MB/s writes) — useful for back-of-envelope partition-count math."},
  {id:"q9r3m", topic:"DynamoDB", diff:"tricky", level:"Senior", type:"single",
    q:"HI: an important caveat about DAX (DynamoDB Accelerator) and stale data?",
    options:["DAX never caches reads, so staleness is impossible","DAX only auto-invalidates for writes that pass through DAX; direct writes to DynamoDB leave cached entries stale until TTL/eviction","DAX caches strongly consistent reads, which go stale","DAX needs no client change and is fully transparent"],
    correct:[1],
    why:"HI: DAX is read-through/write-through but only invalidates for writes through DAX. Direct DynamoDB writes bypass it, so entries stay stale until TTL/eviction. DAX also doesn't cache strong reads and needs the DAX client SDK."},

  {id:"q1ssx", topic:"PostgreSQL", diff:"basic", level:"Mid", type:"single",
    q:"HI: what index type does PostgreSQL create by default, including on a primary key?",
    options:["A hash index","A B-tree index","A GIN index","An LSM tree index"],
    correct:[1],
    why:"HI: Postgres defaults to B-tree indexes (auto-created on the primary key), good for exact matches, range queries, and sorting when ORDER BY columns match the index order."},
  {id:"qxq5m", topic:"PostgreSQL", diff:"basic", level:"Mid", type:"single",
    q:"HI: why is read performance the first focus when evaluating Postgres for a social platform?",
    options:["Writes aren't supported without extensions","In most apps reads vastly outnumber writes — users browse far more than they create","Postgres can't index write-heavy tables","Reads are billed separately"],
    correct:[1],
    why:"HI: reads vastly outnumber writes in most apps; users spend far more time browsing than creating, making read performance critical."},
  {id:"qlouw", topic:"PostgreSQL", diff:"tricky", level:"Senior", type:"single",
    q:"HI: a common interview trap with Postgres indexes?",
    options:["Adding an index to every column","Using B-tree indexes for range queries","Indexing the primary key","Multi-column indexes for common query patterns"],
    correct:[0],
    why:"HI: indexing every column is a trap — each index slows writes, consumes disk, and may not even be used if the planner prefers a sequential scan."},
  {id:"q39sj", topic:"PostgreSQL", diff:"tricky", level:"Senior", type:"multi",
    q:"HI social-media example: which operations have which consistency/integrity needs? (select all)",
    options:["Creating a DM thread (thread, participants, first message) must be atomic","Like counts can be eventually consistent","Comments and follows need referential integrity","Follower counts must be strongly consistent across every replica instantly"],
    correct:[0,1,2],
    why:"HI: DM-thread creation must be atomic, like counts can be eventually consistent (a few seconds lag is fine), comments/follows need referential integrity. It doesn't claim follower counts need instant strong consistency."},
  {id:"q1ryg", topic:"PostgreSQL", diff:"tricky", level:"Senior", type:"single",
    q:"HI warns candidates against which kind of statement about Postgres?",
    options:["That it supports B-tree indexes","Overly broad claims like 'NoSQL scales better than Postgres' without understanding the nuances","That reads usually outnumber writes","That indexes speed up reads"],
    correct:[1],
    why:"HI: candidates get tripped up either diving too deep (MVCC, WAL) or making broad claims like 'NoSQL scales better than Postgres' without nuance. Interviewers want informed trade-offs."},

  // ---------- Flink / ZooKeeper (deep dives) ----------
  {id:"q1o6g", topic:"Flink", diff:"basic", level:"Mid", type:"single",
    q:"HI: what fundamentally changes when you count clicks per user over the last 5 minutes vs processing each click independently?",
    options:["You introduce state — each message must remember previous counts","You no longer need Kafka as a source","You can switch back to a stateless DB write","You eliminate windowing"],
    correct:[0],
    why:"HI: the 5-minute window introduces state because each message depends on previous ones, unlike the trivial stateless transform-and-write case."},
  {id:"q19ll", topic:"Flink", diff:"basic", level:"Mid", type:"single",
    q:"HI: before reaching for a stream processor like Flink, what should you first ask?",
    options:["Do I really need real-time latencies?","Can I afford more Kafka partitions?","Is my data structured or unstructured?","Should I use Spark or Hadoop for the sink?"],
    correct:[0],
    why:"HI stresses asking 'do I really need real-time latencies?' — many seeming stream problems reduce to batch problems (Spark/Hadoop), saving an ops headache."},
  {id:"qhdbu", topic:"Flink", diff:"tricky", level:"Senior", type:"multi",
    q:"HI: problems from holding 5-minute click counts as in-memory counters in your own service? (select all)",
    options:["A crash loses all state, forcing slow re-reading of the whole Kafka topic","Scaling out requires complicated state redistribution to new instances","Out-of-order or late events can hurt count accuracy","Kafka can't deliver messages fast enough"],
    correct:[0,1,2],
    why:"HI enumerates crash-losing-state, state redistribution on scaling, and late/out-of-order events as the motivation for Flink. Kafka throughput is not cited."},
  {id:"q1k4l", topic:"Flink", diff:"tricky", level:"Staff", type:"single",
    q:"HI: the role of the Job Manager relative to Task Managers in Flink?",
    options:["The Job Manager coordinates and schedules; Task Managers execute the actual tasks","The Job Manager stores checkpoints and Task Managers only read them","Task Managers coordinate the Job Manager, which only persists state","Both run identical roles with no coordinator"],
    correct:[0],
    why:"HI: the coordinating Job Manager schedules work; Task Managers run it in task slots, which is where parallelism comes from."},
  {id:"q12zw", topic:"Flink", diff:"tricky", level:"Staff", type:"single",
    q:"HI: the basis for Flink's exactly-once processing guarantee?",
    options:["Periodic checkpointing of state to a state backend","Re-reading the entire Kafka topic on every failure","Disabling watermarks so nothing is late","Holding all counters in volatile memory only"],
    correct:[0],
    why:"HI ties exactly-once to checkpointing state into a state backend, letting Flink recover after failure rather than replaying everything from scratch."},
  {id:"q1ym1", topic:"Flink", diff:"basic", level:"Staff", type:"single",
    q:"HI: why do watermarks matter in a Flink job?",
    options:["They let Flink reason about event-time progress and handle late/out-of-order events","They encrypt the stream between operators","They replace the Job Manager","They define how many task slots each Task Manager gets"],
    correct:[0],
    why:"HI: watermarks track event-time progress so windows correctly account for late and out-of-order events."},

  {id:"q1usl", topic:"ZooKeeper", diff:"tricky", level:"Senior", type:"single",

  {id:"q1bgc", topic:"ZooKeeper", diff:"tricky", level:"Staff", type:"single",

  {id:"qy005", topic:"ZooKeeper", diff:"tricky", level:"Staff", type:"single",

  {id:"qv0vy", topic:"ZooKeeper", diff:"basic", level:"Mid", type:"single",

  // ---------- Patterns: Real-time / Contention / Multi-step (deep dives) ----------
  {id:"q5vyf", topic:"Pattern: Real-time", diff:"basic", level:"Mid", type:"single",

    correct:[1],

  {id:"q11b6", topic:"Pattern: Real-time", diff:"basic", level:"Mid", type:"single",
    q:"HI: why does standard HTTP break down for real-time systems?",
    options:["HTTP can't transmit binary data","HTTP is request-response — client asks, server responds, connection closes — so the server can't proactively push","HTTP is always slower than UDP","HTTP requires DNS on every request"],
    correct:[1],

  {id:"qs1pd", topic:"Pattern: Real-time", diff:"tricky", level:"Senior", type:"single",
    q:"HI OSI layering: which protocol/layer/property pairing is correct?",
    options:["IP at Layer 4 guarantees in-order delivery","TCP at Layer 4 is connectionless and spray-and-pray","UDP at Layer 4 is connectionless with no delivery/ordering guarantees","WebSockets at Layer 3 handle packet routing"],
    correct:[2],

  {id:"q1nj6", topic:"Pattern: Real-time", diff:"tricky", level:"Senior", type:"multi",
    q:"HI: which client-server approaches does the first-hop section explicitly cover? (select all)",
    options:["Long Polling","Server-Sent Events (SSE)","WebSockets","GraphQL subscriptions over gRPC"],

  {id:"qq1df", topic:"Pattern: Real-time", diff:"tricky", level:"Staff", type:"single",
    q:"HI: for the second hop (source to the server holding the connection), which two PUSH approaches are contrasted?",
    options:["Pushing via consistent hashes and pushing via pub/sub","Two-phase commit and gossip protocols","Write-ahead logging and change data capture","Leader election and quorum reads"],

  {id:"q1wdz", topic:"Pattern: Real-time", diff:"basic", level:"Mid", type:"single",

  {id:"qjtxc", topic:"Pattern: Contention", diff:"basic", level:"Mid", type:"single",
    q:"HI: how is contention defined?",
    options:["When a database runs out of disk space","When multiple processes compete for the same resource at the same time","When a network partition splits a cluster","When a cache and database disagree on a value"],
    correct:[1],
    why:"HI: contention is multiple processes competing for the same resource at once (the last concert ticket), causing race conditions, double-bookings, and inconsistent state if unhandled."},
  {id:"qlseq", topic:"Pattern: Contention", diff:"tricky", level:"Senior", type:"single",
    q:"HI Alice and Bob ticket example: why does the naive read-check-decrement oversell the seat?",
    options:["The index on concert_id was missing","Bob reads the same count Alice read before Alice writes her update back, so both pass the check and both decrement","The UPDATE had a syntax error","The seat count was cached in a stale CDN"],
    correct:[1],
    why:"HI: Alice reads one seat, then Bob reads the same count before Alice writes; both check what they read, both decrement, dropping the count to negative one."},
  {id:"qkm1j", topic:"Pattern: Contention", diff:"tricky", level:"Senior", type:"multi",
    q:"HI: which approaches to contention are covered as distinct named solutions? (select all)",
    options:["Conditional Writes","Pessimistic Locking","Optimistic Concurrency Control","Eventual consistency via vector clocks"],
    correct:[0,1,2],
    why:"HI enumerates Conditional Writes, Pessimistic Locking, Optimistic Concurrency Control, Isolation Levels, and Distributed Locks. Vector-clock eventual consistency is not listed."},
  {id:"qp10c", topic:"Pattern: Contention", diff:"tricky", level:"Senior", type:"single",
    q:"HI deep dive: the classic gotcha with optimistic concurrency is…",
    options:["The thundering herd problem","The ABA problem","The split-brain problem","The dining philosophers problem"],
    correct:[1],
    why:"HI calls out the ABA problem: a value changes from A to B and back to A between read and write, defeating a naive version check."},
  {id:"q1nwn", topic:"Pattern: Contention", diff:"basic", level:"Mid", type:"single",
    q:"HI: which failure mode is a deep-dive concern specific to pessimistic locking?",
    options:["Lost updates","Deadlocks","Cache stampedes","Clock drift"],
    correct:[1],
    why:"HI has a dedicated deep dive on preventing deadlocks with pessimistic locking — holding locks across multiple resources can make processes wait on each other in a cycle."},
  {id:"qrzl4", topic:"Pattern: Contention", diff:"tricky", level:"Senior", type:"single",
    q:"HI's stance on when to reach for heavy contention machinery?",
    options:["Always use distributed locks to be safe","It has a 'When NOT to overcomplicate' section, warning against over-engineering low-contention cases","Pessimistic locking should be the default everywhere","Contention can only be solved with a dedicated coordination service"],
    correct:[1],
    why:"HI's 'When NOT to overcomplicate' section signals you should match the solution to the actual level of contention rather than always reaching for distributed locks/OCC."},

  {id:"q18xc", topic:"Pattern: Multi-step", diff:"basic", level:"Staff", type:"single",

  {id:"q1ldb", topic:"Pattern: Multi-step", diff:"tricky", level:"Staff", type:"single",

  {id:"qlqc1", topic:"Pattern: Multi-step", diff:"tricky", level:"Staff", type:"multi",

  {id:"q19uk", topic:"Pattern: Multi-step", diff:"tricky", level:"Senior", type:"single",

  {id:"qxone", topic:"Pattern: Scaling Reads", diff:"basic", level:"Mid", type:"single",

    why:"HI: it's usually not a software problem you can debug away; it's physics, where CPU, memory, and disk I/O hit hard constraints more code can't overcome."},
  {id:"q19t8", topic:"Pattern: Scaling Reads", diff:"tricky", level:"Senior", type:"single",
    q:"HI: the natural read-scaling progression?",
    options:["Add caching, then shard, then optimize the database","Optimize within the DB, scale the DB horizontally (replicas/sharding), then add external caching (app + CDN)","Buy a CDN first, then add replicas, then index","Shard first, denormalize, then upgrade hardware"],

  {id:"q10or", topic:"Pattern: Scaling Reads", diff:"tricky", level:"Senior", type:"multi",

    options:["Indexing","Hardware upgrades","Denormalization strategies","CDN and edge caching"],
    correct:[0,1,2],

  {id:"qj2d4", topic:"Pattern: Scaling Reads", diff:"tricky", level:"Senior", type:"single",
    q:"HI deep dive: many requests rebuild the SAME expired cache entry at once. What's this called?",

  {id:"qkm6m", topic:"Pattern: Scaling Writes", diff:"basic", level:"Mid", type:"single",

  {id:"q1syk", topic:"Pattern: Scaling Writes", diff:"tricky", level:"Senior", type:"multi",
