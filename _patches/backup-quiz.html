<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Quiz — FAANG EM Prep</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --panel2:#222b38; --line:#2d3744;
    --txt:#e6edf3; --muted:#8b98a8; --accent:#4f9cf9; --accent2:#7c5cff;
    --ok:#2ecc71; --okbg:#11331f; --bad:#ff5c5c; --badbg:#3a1518;
    --warn:#ffb84d; --chip:#26313f;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;font-size:15px}
  .wrap{max-width:920px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  .row{display:flex;flex-wrap:wrap;gap:8px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:14px;
    font-weight:600;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.1)}
  .btn.sec{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .chip{background:var(--chip);border:1px solid var(--line);color:var(--txt);border-radius:20px;
    padding:6px 13px;font-size:13px;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:6px}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip .ct{opacity:.7;font-size:11px}
  .label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
  /* question */
  .qtop{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .qmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .tag{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .tag.topic{color:var(--accent);border-color:#2c4a6e}
  .tag.tricky{color:var(--warn);border-color:#5a4520}
  .tag.lvl-Mid{color:#8b98a8;border-color:#3a4654}
  .tag.lvl-Senior{color:#4f9cf9;border-color:#2c4a6e}
  .tag.lvl-Staff{color:#ffd24d;border-color:#6b5410;background:#2c2410}
  .qtext{font-size:17px;font-weight:600;margin:10px 0 4px}
  .multi-note{font-size:12px;color:var(--warn);margin-bottom:12px}
  .opt{display:flex;gap:11px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;margin-bottom:9px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.sel{border-color:var(--accent);background:#1c2c40}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt .box{width:20px;height:20px;border-radius:5px;border:2px solid var(--muted);flex:0 0 auto;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .opt.radio .box{border-radius:50%}
  .opt.sel .box{border-color:var(--accent);color:var(--accent)}
  .opt.correct .box{border-color:var(--ok);color:var(--ok)}
  .opt.wrong .box{border-color:var(--bad);color:var(--bad)}
  .opt.locked{cursor:default}
  .feedback{border-radius:10px;padding:13px 15px;margin-top:12px;font-size:14px;display:none}
  .feedback.show{display:block}
  .feedback.good{background:var(--okbg);border:1px solid var(--ok)}
  .feedback.bad{background:var(--badbg);border:1px solid var(--bad)}
  .feedback b{display:block;margin-bottom:5px}
  .feedback .why{color:var(--txt);opacity:.92}
  .feedback .more{color:var(--txt);opacity:.82;font-size:13px;margin-top:8px;padding-top:8px;border-top:1px solid var(--line)}
  .feedback .src{margin-top:9px;font-size:12.5px}
  .feedback .src a{color:var(--accent)}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px}
  .progress{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-bottom:16px}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:.3s}
  /* stats */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center}
  .stat .n{font-size:26px;font-weight:700}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .bar-row .name{width:160px;font-size:13px;flex:0 0 auto}
  .bar-row .track{flex:1;height:18px;background:var(--panel2);border-radius:5px;overflow:hidden;position:relative}
  .bar-row .fill{height:100%;border-radius:5px}
  .bar-row .pct{width:78px;text-align:right;font-size:12px;color:var(--muted);flex:0 0 auto}
  .weak{color:var(--bad);font-weight:600}
  .hist-item{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .hist-item:last-child{border:none}
  .muted{color:var(--muted)}
  .hide{display:none!important}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--panel2);border:1px solid var(--line)}
  a.link{color:var(--accent);cursor:pointer}
  .toprow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="toprow">
    <div>
      <h1>System Design Quiz</h1>
      <div class="sub">FAANG EM (L6) prep · topic-tagged · tracks weak areas · saves history</div>
    </div>
    <div class="row">
      <button class="btn sec" id="tab-quiz">Quiz</button>
      <button class="btn ghost" id="tab-stats">Stats &amp; History</button>
    </div>
  </div>

  <!-- ============ SETUP ============ -->
  <div id="view-setup">
    <div class="card">
      <div class="label">1 · Pick topics</div>
      <div class="row" id="topicChips" style="margin-bottom:10px"></div>
      <div class="row">
        <button class="btn ghost" id="selAll">Select all</button>
        <button class="btn ghost" id="selNone">Clear</button>
        <button class="btn ghost" id="selWeak">Weak topics only</button>
      </div>
    </div>
    <div class="card">
      <div class="label">2 · Options</div>
      <div class="row" style="align-items:center">
        <label class="muted" style="font-size:13px">Difficulty
          <select id="diffSel">
            <option value="all">All</option>
            <option value="basic">Basic only</option>
            <option value="tricky">Tricky only</option>
          </select>
        </label>
        <label class="muted" style="font-size:13px">Seniority
          <select id="levelSel">
            <option value="all">All levels</option>
            <option value="Mid">Mid</option>
            <option value="Senior">Senior</option>
            <option value="Staff">Staff</option>
          </select>
        </label>
        <label class="muted" style="font-size:13px">Length
          <select id="lenSel">
            <option value="10">10 questions</option>
            <option value="20">20 questions</option>
            <option value="0">All matching</option>
          </select>
        </label>
        <label class="chip"><input type="checkbox" id="shuffleChk" checked style="accent-color:var(--accent)"> Shuffle</label>
      </div>
    </div>
    <button class="btn" id="startBtn" style="font-size:16px;padding:13px 28px">Start quiz →</button>
    <span class="muted" id="poolInfo" style="margin-left:12px;font-size:13px"></span>
  </div>

  <!-- ============ QUIZ ============ -->
  <div id="view-quiz" class="hide">
    <div class="progress"><div id="progFill"></div></div>
    <div class="card" id="qCard"></div>
    <div class="nav">
      <button class="btn ghost" id="quitBtn">Quit</button>
      <div class="row">
        <button class="btn" id="checkBtn">Check</button>
        <button class="btn" id="nextBtn" disabled>Next →</button>
      </div>
    </div>
  </div>

  <!-- ============ RESULT ============ -->
  <div id="view-result" class="hide">
    <div class="card">
      <h1 style="margin-bottom:14px">Session result</h1>
      <div class="stat-grid" id="resStats"></div>
    </div>
    <div class="card">
      <div class="label">By topic this session</div>
      <div id="resTopics"></div>
    </div>
    <div class="row">
      <button class="btn" id="againBtn">New quiz</button>
      <button class="btn sec" id="retryWeakBtn">Retry weak topics</button>
    </div>
  </div>

  <!-- ============ STATS ============ -->
  <div id="view-stats" class="hide">
    <div class="card">
      <div class="label">All-time totals</div>
      <div class="stat-grid" id="allStats"></div>
    </div>
    <div class="card">
      <div class="toprow" style="margin-bottom:12px">
        <div class="label" style="margin:0">Mastery by topic</div>
        <span class="muted" style="font-size:12px">red = weak (&lt;60% &amp; ≥3 answered)</span>
      </div>
      <div id="topicBars"></div>
    </div>
    <div class="card">
      <div class="label">Recent sessions</div>
      <div id="histList"></div>
    </div>
    <button class="btn ghost" id="resetBtn">Reset all history</button>
  </div>
</div>

<script>
/* ============================================================
   QUESTION BANK
   type: "single" | "multi"
   correct: array of option indices
   Aligned to Denis's System Design tracker + miss log.
   ============================================================ */
const QUESTIONS = [
  // ---------- SQL vs NoSQL ----------
  {id:"q150s", topic:"SQL vs NoSQL", diff:"basic", level:"Mid", type:"single",
    q:"What is the strongest single reason to reach for a NoSQL store like Cassandra/DynamoDB over Postgres?",
    options:["It is always faster","Very high write throughput with known key-based access patterns","It supports JOINs better","It guarantees stronger consistency"],
    correct:[1],
    why:"The real differentiator is the access pattern + write profile — not ACID. NoSQL shines for huge write throughput and queries by a known key; SQL wins for complex/ad-hoc queries, joins, and transactions."},
  {id:"q132o", topic:"SQL vs NoSQL", diff:"tricky", level:"Senior", type:"single",
    q:"You're designing a billing/ledger system at massive scale. Which is the better default and why?",
    options:["NoSQL — scale always wins","SQL — you need multi-row transactions, integrity and ad-hoc queries even if it costs scale","NoSQL — money is just key/value","Either, it doesn't matter at scale"],
    correct:[1],
    why:"Finance/billing is the classic 'SQL despite scale' case: transactions, joins and auditability matter more than raw write throughput. NoSQL fits activity feeds, telemetry, chat — not ledgers."},
  {id:"q1l7t", topic:"SQL vs NoSQL", diff:"tricky", level:"Senior", type:"multi",
    q:"Which workloads are natural fits for NoSQL? (select all)",
    options:["Activity feed","Double-entry accounting","Device telemetry / time-series","Chat message history"],
    correct:[0,2,3],
    why:"Feeds, telemetry and chat are high-volume, key-accessed, tolerant of eventual consistency. Double-entry accounting needs transactions → SQL."},

  // ---------- Sharding ----------
  {id:"q14ds", topic:"Sharding", diff:"basic", level:"Mid", type:"single",
    q:"What problem does sharding primarily solve?",
    options:["Making queries strongly consistent","Horizontal scaling beyond one node's capacity","Removing the need for replication","Eliminating hotspots automatically"],
    correct:[1],
    why:"Sharding = horizontal partitioning to scale past a single node. It does NOT remove replication, and it can actually create hotspots."},
  {id:"q10dm", topic:"Sharding", diff:"tricky", level:"Senior", type:"multi",
    q:"Which are genuine pains introduced by sharding? (select all)",
    options:["Hot shards (celebrity / skewed key)","Cross-shard queries & distributed transactions","Resharding / rebalancing cost","Loss of all indexing ability"],
    correct:[0,1,2],
    why:"The three big pains: hotspots, cross-shard joins/transactions, and the cost of resharding. Indexes still exist — just per shard."},
  {id:"qh29l", topic:"Sharding", diff:"tricky", level:"Senior", type:"single",
    q:"You shard by user_id with a hash. A few celebrity users overwhelm their shard. Best first mitigation?",
    options:["Switch the whole DB to range sharding","Add a secondary cache / split the hot key (sub-sharding, dedicated handling)","Increase replication factor everywhere","Remove sharding"],
    correct:[1],
    why:"Hotspots are handled by isolating/splitting the hot key (dedicated shard, key-splitting, caching the celebrity), not by re-architecting the whole scheme."},

  // ---------- Replication & consistency ----------
  {id:"qx9pl", topic:"Replication", diff:"tricky", level:"Senior", type:"single",
    q:"What defines MULTI-leader replication (vs single-leader)?",
    options:["A standby that takes over on failover","Several nodes accept writes simultaneously (e.g. multi-DC)","One node serves reads, another serves writes","Clients write to a quorum of nodes"],
    correct:[1],
    why:"Multi-leader = multiple nodes accept writes at once (common across data centers); its core pain is write-conflict resolution. It is NOT 'failover' — that's single-leader."},
  {id:"q1tvi", topic:"Replication", diff:"tricky", level:"Senior", type:"single",
    q:"In leaderless replication (Dynamo/Cassandra), how is consistency tuned?",
    options:["By electing a leader per partition","By quorum: ensure W + R > N","By using two-phase commit","By disabling replication on reads"],
    correct:[1],
    why:"Leaderless: client writes/reads multiple replicas; you get strong-ish consistency when write quorum + read quorum exceed the replica count (W + R > N)."},
  {id:"qvqce", topic:"Replication", diff:"tricky", level:"Senior", type:"single",
    q:"'Read-after-write consistency' guarantees that…",
    options:["The system waits for full replication before any read","A user immediately sees their OWN write","All users see the write at the same time","Reads always hit the leader"],
    correct:[1],
    why:"Read-your-writes = a user sees their own just-made write, even if other replicas lag. It does NOT mean global sync or that everyone sees it instantly."},
  {id:"q1jab", topic:"Replication", diff:"basic", level:"Staff", type:"single",
    q:"Single-leader replication handles a leader crash via…",
    options:["Conflict resolution","Leader election / failover to a replica","Quorum reads","Sharding"],
    correct:[1],
    why:"Single-leader: all writes go to one node; on crash a replica is promoted via failover/leader election."},

  // ---------- CAP / PACELC ----------
  {id:"q1tib", topic:"CAP / PACELC", diff:"basic", level:"Staff", type:"single",
    q:"What do the three letters in CAP stand for?",
    options:["Cache, Availability, Performance","Consistency, Availability, Partition tolerance","Consistency, Atomicity, Persistence","Concurrency, Availability, Parallelism"],
    correct:[1],
    why:"Consistency, Availability, Partition tolerance. (Easy to blank on A & P under pressure — anchor it.)"},
  {id:"q1vto", topic:"CAP / PACELC", diff:"tricky", level:"Staff", type:"single",
    q:"The 'real' CAP choice in practice is between…",
    options:["Consistency vs Partition tolerance","Availability vs Partition tolerance","Consistency vs Availability DURING a partition","Latency vs Consistency"],
    correct:[2],
    why:"Partitions are inevitable, so you can't trade away P. The actual decision is C vs A when a partition happens: CP refuses to answer; AP answers possibly-stale."},
  {id:"qv7zr", topic:"CAP / PACELC", diff:"tricky", level:"Staff", type:"single",
    q:"What does PACELC add beyond CAP?",
    options:["A third consistency level","Even with no partition (Else), you trade Latency vs Consistency","A way to avoid partitions entirely","Partition detection"],
    correct:[1],
    why:"PACELC: if Partition → choose A or C; Else (normal operation) → choose Latency or Consistency. It captures the everyday latency cost of strong consistency."},

  // ---------- Caching ----------
  {id:"qxb1q", topic:"Caching", diff:"basic", level:"Mid", type:"single",
    q:"In cache-aside, who writes to the cache on a miss?",
    options:["The database","The application code, after reading from the DB","The cache populates itself","A background job only"],
    correct:[1],
    why:"Cache-aside (lazy loading): app checks cache, on miss reads DB and then populates the cache. Write-through writes cache+DB synchronously; write-back defers the DB write."},
  {id:"q17el", topic:"Caching", diff:"tricky", level:"Senior", type:"single",
    q:"A popular key expires and thousands of requests hit the DB at once to rebuild it. This is…",
    options:["Cache stampede / thundering herd","Cache-aside","A hot shard","Write amplification"],
    correct:[0],
    why:"Cache stampede / thundering herd. Mitigate with a lock/single-flight (one rebuild), TTL jitter, or refresh-ahead."},
  {id:"q111r", topic:"Caching", diff:"tricky", level:"Senior", type:"multi",
    q:"Which mitigate a cache stampede? (select all)",
    options:["Single-flight / lock so only one request rebuilds","Add TTL jitter so keys don't expire together","Refresh-ahead before expiry","Disable the cache under load"],
    correct:[0,1,2],
    why:"Lock/single-flight, TTL jitter and refresh-ahead all spread or collapse the rebuild. Disabling the cache just sends everything to the DB."},
  {id:"q14pg", topic:"Caching", diff:"tricky", level:"Senior", type:"single",
    q:"Beyond eviction, the two hard cache problems are staleness/invalidation and…",
    options:["Compression","Cache stampede / thundering herd","Serialization format","Key naming"],
    correct:[1],
    why:"Invalidation/staleness and stampede are the two that bite in interviews."},

  // ---------- CDN / Blob ----------
  {id:"q1qfn", topic:"CDN / Blob", diff:"basic", level:"Mid", type:"single",
    q:"You store user-uploaded videos. What goes in the relational DB?",
    options:["The raw binary as a BLOB column","Only the object-store URL / reference","A base64 string of the file","Nothing, DB isn't involved"],
    correct:[1],
    why:"Keep binaries in object storage (S3/GCS) and store only the URL/reference in the DB — binaries wreck index and cache efficiency."},
  {id:"q1t2q", topic:"CDN / Blob", diff:"basic", level:"Mid", type:"single",
    q:"A CDN's main job is to…",
    options:["Run application logic at the edge","Geo-cache static content near users, cutting latency and offloading origin","Replace your database","Encrypt all traffic"],
    correct:[1],
    why:"CDN = geographically distributed edge cache for static assets; reduces latency and origin load. It often sits in front of blob storage."},

  // ---------- Redis ----------
  {id:"q1prk", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"Redis command execution model is…",
    options:["Multi-threaded with locks per key","Single-threaded — commands run atomically, but a heavy command blocks the whole box","Process-per-connection","Lock-free across cores"],
    correct:[1],
    why:"Core architectural fact: Redis executes commands single-threaded. That gives atomicity for free, but an expensive command (e.g. KEYS, big sort) stalls everything."},
  {id:"q1f9d", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"A single-node Redis is best described as…",
    options:["Consistent but not durable","Durable but not consistent","Both consistent and durable","Neither"],
    correct:[0],
    why:"Single node is consistent (one copy, atomic ops) but not durable by default (in-memory). Common miss: saying it 'sacrifices consistency' — it sacrifices durability."},
  {id:"qbp3s", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"How does Redis Cluster map keys to nodes?",
    options:["Consistent hashing ring","16384 fixed hash slots, slot = CRC16(key) mod 16384","Range partitioning by key prefix","Random assignment"],
    correct:[1],
    why:"Redis Cluster uses 16384 fixed hash slots (CRC16 mod 16384), NOT consistent hashing. Slots move between nodes on rebalance; clients follow MOVED/ASK redirects."},
  {id:"q12db", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"What is the DEFAULT eviction policy in Redis?",
    options:["allkeys-lru","volatile-ttl","noeviction (writes error when memory is full)","random"],
    correct:[2],
    why:"Default is noeviction — once maxmemory is hit, writes fail rather than silently dropping data. You must opt into LRU/LFU for a pure cache."},
  {id:"q1e2g", topic:"Redis", diff:"tricky", level:"Senior", type:"multi",
    q:"Which give Redis durability options? (select all)",
    options:["RDB snapshots","AOF append-only log","Single-threading","MemoryDB for true durability"],
    correct:[0,1,3],
    why:"RDB (point-in-time snapshots) + AOF (logs every write; everysec ≈ 1s loss, always = no loss but slow). For true durability use MemoryDB. Single-threading is about execution, not durability."},
  {id:"q196r", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"How do you make a multi-step Redis operation (e.g. a rate-limiter check-and-decrement) atomic?",
    options:["Wrap it in a Lua script (or MULTI/EXEC)","Use a transaction across two nodes","Rely on single-threading of separate commands","Add a mutex in the client"],
    correct:[0],
    why:"A Lua script runs atomically on the server; MULTI/EXEC(+WATCH) also works. Separate commands aren't atomic relative to each other even though each one is."},
  {id:"q1i5v", topic:"Redis", diff:"tricky", level:"Senior", type:"single",
    q:"Redis Pub/Sub vs Redis Streams — the key difference?",
    options:["Streams are faster","Pub/Sub is at-most-once (no persistence); Streams persist messages with consumer groups","Pub/Sub persists, Streams don't","They are identical"],
    correct:[1],
    why:"Pub/Sub = fire-and-forget, at-most-once (offline subscribers miss messages). Streams persist the log and support consumer groups + replay — closer to Kafka-lite."},
  {id:"qqqvm", topic:"Redis", diff:"tricky", level:"Staff", type:"single",
    q:"Redlock (distributed lock across Redis nodes) — what's the nuance a senior should mention?",
    options:["It's perfectly safe always","Kleppmann's critique: it's unsafe under GC pauses/clock skew — use fencing tokens / a real consensus system for correctness-critical locks","It only works on one node","It requires MemoryDB"],
    correct:[1],
    why:"Redlock works for efficiency locks but Kleppmann showed it's not safe for correctness under pauses/clock issues. Mention fencing tokens or a consensus store (ZK/etcd) for hard locks."},

  // ---------- Load balancing ----------
  {id:"q1awb", topic:"Load balancing", diff:"tricky", level:"Senior", type:"single",
    q:"Key difference between an L4 and an L7 load balancer?",
    options:["L4 is slower than L7","L4 routes by IP/port (content-blind); L7 sees HTTP URL/headers/cookies → content routing, SSL termination, sticky sessions","L7 only does TCP","L4 can read cookies"],
    correct:[1],
    why:"L4 = transport (TCP/UDP), fast but content-blind. L7 = application layer, can route by URL/header/cookie, terminate TLS, and do sticky sessions."},
  {id:"q1ibb", topic:"Load balancing", diff:"basic", level:"Mid", type:"multi",
    q:"Which are valid load-balancing algorithms? (select all)",
    options:["Round-robin","Least-connections","Consistent hashing","Two-phase commit"],
    correct:[0,1,2],
    why:"Round-robin, least-connections, weighted, consistent hashing are LB strategies. 2PC is a distributed-transaction protocol."},

  // ---------- Kafka vs queues ----------
  {id:"qfjwz", topic:"Kafka vs Queues", diff:"tricky", level:"Senior", type:"single",
    q:"The defining property of Kafka vs a traditional broker queue (SQS/RabbitMQ)?",
    options:["Kafka deletes messages after ack","Kafka is an append-only log: messages are retained & replayable; consumers track their own offset","Kafka allows only one consumer","Kafka has no ordering"],
    correct:[1],
    why:"Kafka = distributed append-only log. Messages are retained (replayable), consumers track offsets, multiple consumer groups read the same data independently, ordered within a partition."},
  {id:"q96zq", topic:"Kafka vs Queues", diff:"tricky", level:"Senior", type:"single",
    q:"In SQS/RabbitMQ, what happens to a message after a consumer acks it?",
    options:["It's retained for replay","It's deleted from the queue","It moves to another partition","It's broadcast to all consumers"],
    correct:[1],
    why:"Broker queues delete on ack — typically one consumer, no replay. Good for simple background tasks and decoupling, not stream replay/analytics."},
  {id:"q17in", topic:"Kafka vs Queues", diff:"basic", level:"Mid", type:"multi",
    q:"Why put a message queue between services at all? (select all)",
    options:["Decoupling producers from consumers","Load smoothing / buffering bursts","Guaranteeing strong consistency","Throttling downstream load"],
    correct:[0,1,3],
    why:"Queues decouple, smooth/buffer bursts, and throttle downstream. They don't provide strong consistency — they generally push you toward eventual consistency."},
  {id:"qkc73", topic:"Kafka vs Queues", diff:"tricky", level:"Senior", type:"single",
    q:"You need 3 independent teams to each process the same event stream their own way. Best fit?",
    options:["SQS (one consumer deletes the message)","Kafka with separate consumer groups per team","A single RabbitMQ queue","A database table they poll and delete from"],
    correct:[1],
    why:"Kafka's multiple consumer groups each maintain their own offset over the same retained log — exactly the multi-consumer fan-out case."},

  // ---------- Fan-out ----------
  {id:"qymnv", topic:"Fan-out", diff:"tricky", level:"Senior", type:"single",
    q:"Fan-out-on-write (push) for a social timeline means…",
    options:["Build each timeline at read time","On post, write the item into every follower's precomputed timeline","Pull tweets from followees when the user opens the app","Cache the home page in a CDN"],
    correct:[1],
    why:"Push = on write, fan the post into every follower's feed. Fast reads, expensive writes; it breaks for celebrities with millions of followers."},
  {id:"qsq2d", topic:"Fan-out", diff:"tricky", level:"Staff", type:"single",
    q:"Why is pure fan-out-on-write a disaster for a celebrity with 100M followers?",
    options:["Reads become too slow","A single post triggers 100M timeline writes","It loses ordering","It can't be cached"],
    correct:[1],
    why:"One celebrity post = 100M writes. That's why the standard answer is hybrid: push for normal users, pull (fan-out-on-read) for celebrities."},
  {id:"q1mb7", topic:"Fan-out", diff:"basic", level:"Staff", type:"single",
    q:"The standard production answer for a Twitter-style timeline is…",
    options:["Always fan-out-on-write","Always fan-out-on-read","Hybrid: push for normal users, pull for celebrities","Store nothing, recompute every time"],
    correct:[2],
    why:"Hybrid balances write cost and read latency: precompute for the many, compute-on-read for the few huge accounts."},

  // ---------- Rate limiting ----------
  {id:"q1p1p", topic:"Rate limiting", diff:"basic", level:"Mid", type:"single",
    q:"How does the token-bucket algorithm work?",
    options:["Counts requests in fixed windows and resets","Holds N tokens, refills at a fixed rate; each request takes a token; empty → reject","Delays every request by a fixed amount","Drops every Nth request"],
    correct:[1],
    why:"Token bucket: bucket of N tokens, refilled at a steady rate; a request consumes a token, empty bucket rejects. Allows bursts up to bucket size."},
  {id:"qp96x", topic:"Rate limiting", diff:"tricky", level:"Senior", type:"single",
    q:"Where should a rate limiter usually live?",
    options:["Inside the database","At the edge — API gateway / load balancer — per user/IP/API-key","In the client only","In the message queue"],
    correct:[1],
    why:"Put it at the edge (gateway/LB) so abuse is rejected before it reaches downstream services; key it per user/IP/API-key for fairness and DDoS protection."},
  {id:"qhcyc", topic:"Rate limiting", diff:"tricky", level:"Senior", type:"single",
    q:"Which limiter property does token bucket give that a fixed-window counter struggles with?",
    options:["Lower memory use","Smooth handling of short bursts up to the bucket size","Perfect accuracy at window edges","No need for storage"],
    correct:[1],
    why:"Token bucket allows controlled bursts and avoids the fixed-window edge problem (double traffic at the boundary). Sliding-window log/counter also fixes the edge issue."},

  // ---------- Idempotency ----------
  {id:"qbbw1", topic:"Idempotency", diff:"basic", level:"Mid", type:"single",
    q:"An idempotent operation is one where…",
    options:["It can only run once ever","Applying it many times yields the same result as applying it once","It never fails","It runs without a network"],
    correct:[1],
    why:"Idempotent = repeating it has the same effect as doing it once. Crucial because retries are inevitable (a timeout means the client doesn't know if it succeeded)."},
  {id:"qnktr", topic:"Idempotency", diff:"tricky", level:"Senior", type:"single",
    q:"A payment API must avoid double-charging on client retries. Standard mechanism?",
    options:["Lock the user's account","Idempotency key supplied by client; server dedupes on it","Retry only once","Disable retries"],
    correct:[1],
    why:"Client sends a unique idempotency key; the server records it and returns the original result on retries instead of re-charging."},
  {id:"qqjqq", topic:"Idempotency", diff:"tricky", level:"Senior", type:"multi",
    q:"Where is idempotency essential? (select all)",
    options:["Payment / write APIs that clients retry","At-least-once queue consumers (must dedupe)","Pure read-only GET endpoints","Any operation behind unreliable networks"],
    correct:[0,1,3],
    why:"Retryable writes, at-least-once consumers, and anything over flaky networks need it. Pure GETs are already naturally idempotent."},

  // ---------- Distributed transactions ----------
  {id:"qe6oh", topic:"Distributed Txns", diff:"tricky", level:"Staff", type:"single",
    q:"The core problem distributed transactions solve is preserving which ACID property across nodes?",
    options:["Isolation","Durability","Atomicity (all-or-nothing across services)","Consistency only"],
    correct:[2],
    why:"It's primarily Atomicity across nodes — all participants commit or none do. (Common miss: saying 'A & I'.) Saga in particular drops isolation."},
  {id:"qcz22", topic:"Distributed Txns", diff:"tricky", level:"Senior", type:"single",
    q:"Two-phase commit (2PC) is best characterized as…",
    options:["Optimistic, lock-free, eventually consistent","Pessimistic: prepare+commit phases, holds locks, CP, blocking with a coordinator SPOF","Asynchronous compensation","A queue pattern"],
    correct:[1],
    why:"2PC = pessimistic, coordinator-driven prepare/commit, holds locks, CP and blocking; the coordinator is a SPOF (mitigated but real). Used by Spanner/XA."},
  {id:"q1ho5", topic:"Distributed Txns", diff:"tricky", level:"Staff", type:"single",
    q:"A Saga undoes a partially-completed workflow using…",
    options:["A rollback of the global transaction","Compensating transactions (semantic undo per step)","2PC on commit","A database savepoint"],
    correct:[1],
    why:"Saga = sequence of local transactions; on failure it runs compensating transactions to semantically undo prior steps. It trades isolation for availability/eventual consistency."},
  {id:"q1l48", topic:"Distributed Txns", diff:"tricky", level:"Staff", type:"single",
    q:"Saga CHOREOGRAPHY (vs orchestration) means…",
    options:["A central coordinator drives every step","Services react to each other's events via pub/sub — no central coordinator","Two-phase commit between services","A single service does everything"],
    correct:[1],
    why:"Choreography = decentralized, event-driven, each service listens and reacts (no central brain). Orchestration = a central coordinator explicitly drives the steps. (Easy to reverse — anchor it.)"},
  {id:"qzxr7", topic:"Distributed Txns", diff:"tricky", level:"Staff", type:"multi",
    q:"Which are Saga isolation/robustness countermeasures a Staff candidate might name? (select all)",
    options:["Semantic lock","Transactional outbox","Idempotent compensations","Dropping the database entirely"],
    correct:[0,1,2],
    why:"Semantic lock, pivot transaction, transactional outbox, idempotent compensations, TCC — these recover the isolation Saga gives up. The last option is nonsense."},

  // ---------- Real-time transport ----------
  {id:"qxw9w", topic:"Real-time transport", diff:"basic", level:"Mid", type:"single",
    q:"Server-Sent Events (SSE) are best described as…",
    options:["Full-duplex bidirectional channel","One-way server→client over a single long-lived HTTP connection, with auto-reconnect","Client→server only","A polling loop"],
    correct:[1],
    why:"SSE = one-way server→client over one persistent HTTP connection, with built-in auto-reconnect. Great for notifications/feeds; not for bidirectional chat."},
  {id:"qjz31", topic:"Real-time transport", diff:"tricky", level:"Senior", type:"single",
    q:"You're building a chat app needing low-latency two-way messaging. Best transport?",
    options:["Short polling","SSE","WebSocket (full duplex)","Long polling"],
    correct:[2],
    why:"WebSocket = full-duplex over a single persistent connection; right for chat/games. Cost: it's stateful and harder to scale than stateless HTTP."},
  {id:"qaenv", topic:"Real-time transport", diff:"basic", level:"Mid", type:"single",
    q:"Order these from least to most efficient for server-push: polling, long-polling, SSE. Which is the most efficient of the three?",
    options:["Short polling","Long polling","SSE","They're equal"],
    correct:[2],
    why:"Short polling wastes requests; long polling is better; SSE holds one connection and streams events — most efficient of the three for one-way push."},

  // ---------- Observability ----------
  {id:"q4nkf", topic:"Observability", diff:"basic", level:"Mid", type:"multi",
    q:"What are the three pillars of observability? (select all)",
    options:["Metrics","Logs","Traces","Backups"],
    correct:[0,1,2],
    why:"Metrics, logs, traces. Add SLO/SLI/error-budget vocabulary to signal operational maturity."},
  {id:"qda92", topic:"Observability", diff:"tricky", level:"Senior", type:"single",
    q:"An 'error budget' is…",
    options:["Money set aside for incidents","The allowed amount of unreliability = 100% − SLO; once spent, slow feature launches","The number of on-call engineers","A type of circuit breaker"],
    correct:[1],
    why:"Error budget = 1 − SLO. It quantifies acceptable failure and governs the release/risk trade-off — a strong EM operational signal."},
  {id:"q1525", topic:"Observability", diff:"tricky", level:"Senior", type:"multi",
    q:"Which protect a system under partial failure / overload? (select all)",
    options:["Circuit breaker","Backpressure","Graceful degradation","Removing all timeouts"],
    correct:[0,1,2],
    why:"Circuit breakers, backpressure and graceful degradation contain cascading failure. Removing timeouts makes cascades worse."},

  // ---------- SPOF ----------
  {id:"q1gh5", topic:"SPOF / Reliability", diff:"basic", level:"Mid", type:"single",
    q:"The cleanest mental test for a single point of failure is…",
    options:["'Is this component slow?'","'If this component dies, does the whole system stop?'","'Is this component expensive?'","'Does this component use a cache?'"],
    correct:[1],
    why:"Walk every component and ask 'if it dies, does the system stop?' Eliminate via redundancy: multiple instances, replicas, multi-AZ, auto-failover, no un-backed shared resource."},
  {id:"qmaky", topic:"SPOF / Reliability", diff:"tricky", level:"Senior", type:"multi",
    q:"Which genuinely remove a SPOF? (select all)",
    options:["Multiple stateless instances behind an LB","Multi-AZ replicas with auto-failover","A single shared NFS mount everything depends on","Active-active across regions"],
    correct:[0,1,3],
    why:"Redundancy at every layer removes SPOFs. A single shared NFS mount everything needs IS a SPOF, not a fix."},

  // ---------- Estimation ----------
  {id:"qf68d", topic:"Estimation", diff:"tricky", level:"Senior", type:"single",
    q:"Rough QPS for 100M daily active users each making ~10 requests/day (uniform)?",
    options:["~115 QPS","~1,150 QPS","~11,500 QPS","~115,000 QPS"],
    correct:[2],
    why:"1e8 × 10 = 1e9 req/day. 1 day ≈ 86,400s ≈ 1e5. 1e9 / 1e5 ≈ 10,000 → ~11.5k QPS average. Multiply by ~2–3 for peak."},
  {id:"qz62n", topic:"Estimation", diff:"basic", level:"Mid", type:"single",
    q:"Roughly how many seconds are in a day (the number to memorize for QPS math)?",
    options:["~3,600","~86,400 (~10^5)","~604,800","~1,000,000"],
    correct:[1],
    why:"86,400 ≈ 10^5. Memorize it: daily count ÷ 10^5 ≈ average QPS."},
  {id:"q185g", topic:"Estimation", diff:"tricky", level:"Senior", type:"single",
    q:"You store 500M records × 2 KB each. Approximate raw storage?",
    options:["~1 GB","~10 GB","~1 TB","~100 TB"],
    correct:[2],
    why:"5e8 × 2e3 bytes = 1e12 bytes ≈ 1 TB. Then add indexes/replication overhead (×3 for RF=3)."},

  // ---------- API design ----------
  {id:"q1wgr", topic:"API design", diff:"tricky", level:"Senior", type:"single",
    q:"For high-throughput internal service-to-service calls, what's a common reason to prefer gRPC over REST/JSON?",
    options:["It's easier to curl","Binary protobuf + HTTP/2 multiplexing → lower latency & payloads, streaming, strong contracts","It needs no schema","Browsers support it natively everywhere"],
    correct:[1],
    why:"gRPC uses protobuf over HTTP/2: compact binary, multiplexing, bidirectional streaming, codegen contracts. REST/JSON wins for public, human-debuggable, browser-facing APIs."},
  {id:"q14kw", topic:"API design", diff:"basic", level:"Mid", type:"single",
    q:"For a list endpoint returning millions of rows, the right pattern is…",
    options:["Return everything in one response","Pagination (cursor/keyset preferred over large offsets)","Force the client to filter client-side","Use a websocket"],
    correct:[1],
    why:"Paginate. Cursor/keyset pagination scales better than OFFSET, which degrades on deep pages."},
