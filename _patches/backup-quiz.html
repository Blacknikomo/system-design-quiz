    options:["The database runs out of rows","Most web servers and load balancers enforce ~30-60s timeouts, so the request may not even complete","Browsers refuse all requests over 10 seconds","PDFs can't be generated server-side"],
    correct:[1],
    why:"HI: the 45s report often won't complete synchronously because servers/LBs enforce ~30-60s timeout limits, on top of the user staring at a spinner."},
  {id:"qsm0y", topic:"Pattern: Long-Running Tasks", diff:"tricky", level:"Senior", type:"single",
    q:"HI: in the immediate-acknowledgment phase, what does the web server return almost instantly?",
    options:["The fully rendered PDF","A job ID after validating and pushing the job to a queue","A read replica connection string","The raw queue offset and worker IP"],
    correct:[1],
    why:"HI: the web server validates, pushes a job to a queue (Redis/RabbitMQ), and returns a job ID within milliseconds, while workers do the heavy lifting and update status."},
  {id:"qeh15", topic:"Pattern: Long-Running Tasks", diff:"tricky", level:"Senior", type:"multi",
    q:"HI: which are listed as common deep dives in the long-running-tasks article? (select all)",
    options:["Handling repeated failures","Preventing duplicate work","Managing queue backpressure","Choosing a CDN region"],
    correct:[0,1,2],
    why:"HI lists handling failures, repeated failures, preventing duplicate work, queue backpressure, mixed workloads, and job dependencies. CDN region selection belongs to the large blobs pattern."},
  {id:"qg5sa", topic:"Pattern: Long-Running Tasks", diff:"tricky", level:"Senior", type:"single",
    q:"HI: how is the worker side described?",
    options:["A single thread inside the web server","Separate worker processes that continuously poll the queue, grab pending jobs, execute the work, and update job status","The client browser running the task locally","A read replica that auto-executes jobs"],
    correct:[1],
    why:"HI: separate worker processes continuously poll the queue, grab pending jobs, run the time-consuming work, and update job status in a database — decoupled from the web server."},

  /* ============================================================
     QUESTION BREAKDOWNS — grounded in HI problem walkthroughs
     ============================================================ */

  // ---------- Design: Bitly (URL shortener) ----------
  {id:"q1c3k", topic:"Design: Bitly", diff:"tricky", level:"Senior", type:"single",
    q:"HI Bitly: preferred way to generate the short code, and why?",
    options:["Hash the long URL and take the first 7 chars","A unique counter encoded in Base62, so codes are unique by construction","Random 7-char strings with retry on collision","Use the long URL itself, URL-encoded"],
    correct:[1],
    why:"HI leans to counter + Base62: uniqueness is guaranteed, no collision handling needed. Hashing/truncation works but requires a UNIQUE constraint and collision retries; keep that constraint anyway as a safety net."},
  {id:"qyps8", topic:"Design: Bitly", diff:"tricky", level:"Senior", type:"single",
    q:"HI Bitly: how do you make the global counter fast and not a per-request bottleneck?",
    options:["A SQL AUTO_INCREMENT column hit on every write","A single Redis atomic INCR, with counter batching (claim ~1000 IDs at a time per server)","A UUID generated on each app server","A timestamp in milliseconds"],
    correct:[1],
    why:"HI: Redis INCR is atomic and fast; batching ID ranges (grab 1000 at once) cuts network round-trips. Losing a few counter values on failover is fine — you only need uniqueness, not a gap-free sequence."},
  {id:"q1cys", topic:"Design: Bitly", diff:"tricky", level:"Senior", type:"single",
    q:"HI Bitly: 301 vs 302 redirect — which does HI prefer and why?",
    options:["301 permanent — browsers cache it, lowering load","302 temporary — keeps requests flowing through your server so you retain control and can add analytics","301 because it is better for SEO","It makes no difference"],
    correct:[1],
    why:"HI prefers 302: the browser keeps hitting your server, so you keep control and can later add click analytics. 301 lets the browser cache the redirect (less load, but you lose visibility)."},

  // ---------- Design: Dropbox (file storage/sync) ----------
  {id:"q1631", topic:"Design: Dropbox", diff:"tricky", level:"Senior", type:"single",
    q:"HI Dropbox: where should large files be chunked, and via what mechanism?",
    options:["On the server after a single large upload","On the client, using S3 Multipart Upload (per-part presigned URLs)","Inside the database as BLOB rows","Chunking isn't needed below 50GB"],
    correct:[1],
    why:"HI: chunk on the CLIENT (5–10MB), then S3 Multipart Upload — CreateMultipartUpload → presigned URL per part → CompleteMultipartUpload. Server-side chunking defeats the purpose (the big file still flows through your servers)."},
  {id:"qbucr", topic:"Design: Dropbox", diff:"tricky", level:"Senior", type:"single",
    q:"HI Dropbox: what should identify a file/chunk for dedup and resumable uploads?",
    options:["The filename","The user ID + timestamp","A SHA-256 hash of the content (a fingerprint)","An auto-increment ID"],
    correct:[2],
    why:"HI: fingerprint = SHA-256 of content. It enables dedup (same content already stored) and resumability (which chunks are already present), neither of which a filename can do."},
  {id:"qdaqq", topic:"Design: Dropbox", diff:"tricky", level:"Staff", type:"single",
    q:"HI Dropbox: fixed-size chunks re-upload the whole file when you insert a byte near the start. The fix?",
    options:["Larger fixed chunks","Content-Defined Chunking (CDC) with a rolling hash (Rabin fingerprinting)","Upload only at night","Disable chunking for edited files"],
    correct:[1],
    why:"HI: with fixed offsets, an early insert shifts every boundary so all chunks look changed. Content-defined chunking sets boundaries by a rolling hash of the content, so only the edited region's chunks change."},

  // ---------- Design: Ticketmaster ----------
  {id:"q1awh", topic:"Design: Ticketmaster", diff:"tricky", level:"Senior", type:"single",
    q:"HI Ticketmaster: how to hold a seat for ~10 min during checkout without double-booking?",
    options:["A long-running DB transaction holding a row lock","A Redis distributed lock with a TTL that auto-expires if the user abandons","A boolean column flipped with no timeout","Optimistic retries only"],
    correct:[1],
    why:"HI's 'great' answer: Redis lock keyed by seat with a TTL (~10 min) so abandoned holds auto-release. A status+expiration column scanned by cron is the 'good' fallback. The final DB write with ACID is what actually guarantees no double-book."},
  {id:"q1g7u", topic:"Design: Ticketmaster", diff:"tricky", level:"Staff", type:"single",
    q:"HI Ticketmaster: the staff-level differentiator for a 10M-users-on-one-event on-sale is…",
    options:["Bigger database instances","A virtual waiting queue that admits users to the booking flow in a controlled trickle","Caching the seat map harder","Sharding by seat ID"],
    correct:[1],
    why:"HI: a virtual waiting queue protects the booking path from a thundering herd by admitting users in controlled batches — the 'think outside the box' move that signals senior/staff."},
  {id:"qwqgk", topic:"Design: Ticketmaster", diff:"tricky", level:"Senior", type:"single",
    q:"HI Ticketmaster: why not implement event search with SQL LIKE '%term%'?",
    options:["LIKE isn't valid SQL","It forces a full table scan (no index help) — use Elasticsearch for full-text search","It returns wrong results","It only works on numbers"],
    correct:[1],
    why:"HI: leading-wildcard LIKE can't use a B-tree index, so it scans the whole table — too slow at scale. Elasticsearch's inverted index is the right tool; add query-result/edge caching."},

  // ---------- Design: News Feed ----------
  {id:"q1yt4", topic:"Design: News Feed", diff:"tricky", level:"Staff", type:"single",
    q:"HI News Feed: the standard answer for mixing normal users and celebrities is…",
    options:["Pure fan-out-on-write for everyone","Pure fan-out-on-read for everyone","Hybrid: precompute feeds for normal users, fan-out-on-read for celebrities, merge at read time","Store no feeds, recompute every request"],
    correct:[2],
    why:"HI's 'great' solution: precompute (push) into a per-user feed table for normal accounts, but pull celebrity posts at read time and merge — avoiding the millions-of-writes-per-celebrity-post explosion."},
  {id:"q1sie", topic:"Design: News Feed", diff:"tricky", level:"Senior", type:"single",
    q:"HI News Feed: a few hot posts get hammered and your DynamoDB feed cache develops a hot key. Fix?",
    options:["Increase the TTL","Replicate the hot entry across multiple cache nodes (redundant post cache) to spread reads","Switch to a single bigger cache node","Stop caching hot posts"],
    correct:[1],
    why:"HI: DynamoDB (and single cache nodes) hate hot keys. Replicating the hot post across several cache nodes spreads the read load instead of concentrating it on one partition."},

  // ---------- Design: WhatsApp ----------
  {id:"qsoqs", topic:"Design: WhatsApp", diff:"tricky", level:"Senior", type:"single",
    q:"HI WhatsApp: sender and receiver are connected to different chat servers. How do you route the message?",
    options:["A Kafka topic per user","Redis Pub/Sub with a topic per user, so the receiver's server is subscribed and gets the message","A shared database both servers poll","Consistent hashing so both users always land on one server"],
    correct:[1],
    why:"HI's 'great' answer: Redis Pub/Sub, one topic per user — sidesteps consistent-hashing complexity. A Kafka topic-per-user is an anti-pattern (Kafka isn't built for hundreds of millions of topics)."},
  {id:"qhggv", topic:"Design: WhatsApp", diff:"tricky", level:"Senior", type:"single",
    q:"HI WhatsApp: Pub/Sub is at-most-once and stores nothing. How is delivery still guaranteed?",
    options:["Switch to TCP only","Write to a durable Inbox table before publishing, require client acks, and use per-chat sequence numbers with gap detection","Send each message twice","Rely on the load balancer to retry"],
    correct:[1],
    why:"HI: persist undelivered messages in an Inbox (delete on ack), and have clients detect gaps via per-chat sequence numbers (piggybacked on heartbeats) with a polling backstop — covering Pub/Sub's dropped messages."},
  {id:"q5imy", topic:"Design: WhatsApp", diff:"tricky", level:"Senior", type:"single",
    q:"HI WhatsApp: how should message ordering be handled?",
    options:["A global total order across all chats","Strict per-chat ordering enforced with locks","NTP-synced server-receipt timestamps; the client sorts by them (accept occasional pop-in)","Order by client device clock"],
    correct:[2],
    why:"HI: don't pay for strict ordering. Stamp messages with NTP-synced server receipt time and let clients sort; users tolerate rare reordering/pop-in. Client clocks can't be trusted."},
  {id:"q1pnf", topic:"Design: WhatsApp", diff:"tricky", level:"Senior", type:"single",
    q:"HI WhatsApp: how do you detect a silently-dead WebSocket connection?",
    options:["Wait for the next user message","Application-level heartbeats (TCP keepalive is too slow)","Ping the database","Close all connections every minute"],
    correct:[1],
    why:"HI: TCP keepalive intervals are too coarse; use application-level heartbeats to spot dead connections quickly (and derive 'last seen' from active connections rather than DB writes per heartbeat)."},

  // ---------- Design: Uber ----------
  {id:"qmlp8", topic:"Design: Uber", diff:"tricky", level:"Senior", type:"single",
    q:"HI Uber: 10M drivers pinging location every few seconds (~2M writes/sec). Where do you store it?",
    options:["DynamoDB with on-demand capacity","An in-memory geospatial store like Redis (geohashing / quadtree)","A Postgres table with a B-tree on (lat, long)","S3 objects per driver"],
    correct:[1],
    why:"HI: that write rate in DynamoDB would cost a fortune (>$200k/day), and a B-tree can't do 2D proximity. Redis with geohashing handles high-frequency writes and radius queries in memory; add adaptive update intervals client-side."},
  {id:"qvwjg", topic:"Design: Uber", diff:"tricky", level:"Staff", type:"single",
    q:"HI Uber: a driver doesn't respond to a ride offer. What's the robust way to handle the multi-step timeout/retry flow?",
    options:["A simple delay queue","Durable execution (e.g. Temporal/Cadence) to drive the offer→timeout→reoffer workflow reliably","A cron job scanning rides","Client-side timers"],
    correct:[1],
    why:"HI: this is the multi-step-process pattern. Durable execution (Uber authored Cadence) survives crashes and reliably advances offer → 10s timeout → next driver, which a fragile delay queue can't guarantee."},
  {id:"q1hws", topic:"Design: Uber", diff:"tricky", level:"Senior", type:"single",
    q:"HI Uber: which values must NOT be trusted from the client?",
    options:["Only the user's name","userId, timestamps, and the fare estimate — derive them from the session/server/DB","Nothing; the client is authenticated","Only the payment token"],
    correct:[1],
    why:"HI repeatedly warns: never trust client-supplied identity or money fields. Pull userId from the session/JWT, set timestamps server-side, and re-read the fare from the DB by fareId."},

  // ---------- Design: Ad Click Aggregator ----------
  {id:"q1ez7", topic:"Design: Ad Click Aggregator", diff:"tricky", level:"Senior", type:"single",
    q:"HI Ad Click Aggregator: the recommended real-time processing pipeline is…",
    options:["Write clicks to Postgres and run GROUP BY on query","Stream (Kafka/Kinesis) → Flink → an OLAP store (e.g. ClickHouse/Druid/BigQuery)","Cron job aggregating a CSV","Client-side counting"],
    correct:[1],
    why:"HI: ingest into a stream, aggregate in Flink, write to an OLAP DB optimized for analytical queries. Using one transactional DB for both ingest and analytics is the anti-pattern."},
  {id:"q19yd", topic:"Design: Ad Click Aggregator", diff:"tricky", level:"Staff", type:"single",
    q:"HI Ad Click Aggregator: a viral ad creates a hot partition. The standard fix?",
    options:["Stop tracking that ad","Append a random suffix to the partition key (AdId:0..N); the aggregator strips it and SUMs the parts","Use a bigger Kafka broker","Switch to fan-out-on-read"],
    correct:[1],
    why:"HI: salt the key with a random suffix so the hot ad's events spread across partitions; the aggregator removes the suffix and sums per AdId. Classic hot-shard remediation."},
  {id:"qupqu", topic:"Design: Ad Click Aggregator", diff:"tricky", level:"Staff", type:"single",
    q:"HI Ad Click Aggregator: how do you guarantee correctness against the fast-but-lossy stream path?",
    options:["Trust the stream; it never loses data","Lambda architecture: also dump raw events to S3 and run a nightly Spark batch as the source of truth, reconciling against the stream","Re-run the stream twice","Cache the results longer"],
    correct:[1],
    why:"HI: speed layer (Flink) for near-real-time + batch layer (Spark over an S3 data lake) as the authoritative recompute. Reconciling the two catches drift/loss in the streaming path."},
  {id:"qgxya", topic:"Design: Ad Click Aggregator", diff:"tricky", level:"Senior", type:"single",
    q:"HI Ad Click Aggregator: how do you make click tracking idempotent (dedupe retries)?",
    options:["Use the userId as the dedup key","Generate a unique impression ID per ad impression and dedupe on it","Count only the first click per minute","Ignore duplicates; they're rare"],
    correct:[1],
    why:"HI: mint a unique impression ID when the ad is served and carry it on the click event, so retried/duplicate clicks collapse to one. userId is too coarse."},

  // ---------- Design: Web Crawler ----------
  {id:"qz8nm", topic:"Design: Web Crawler", diff:"tricky", level:"Senior", type:"single",
    q:"HI Web Crawler: which queue does HI pick for the frontier, and what goes in it?",
    options:["Kafka, storing the raw HTML","SQS, storing only the URL (visibility timeout gives easy backoff + DLQ)","Redis list storing full pages","A SQL table of HTML blobs"],
    correct:[1],
    why:"HI picks SQS: its visibility timeout makes retries/exponential backoff and dead-letter queues easy. Store a URL pointer, not raw HTML (HTML goes to S3) — keep the message small and the URL in-flight until the HTML is confirmed stored."},
  {id:"q15fr", topic:"Design: Web Crawler", diff:"tricky", level:"Senior", type:"single",
    q:"HI Web Crawler: a surprising bottleneck when crawling billions of pages is…",
    options:["CPU for parsing","DNS resolution (cited as up to ~70% of per-thread time) — fix with DNS caching and multiple providers","Disk I/O on the queue","JSON serialization"],
    correct:[1],
    why:"HI (citing the Mercator paper): DNS can dominate thread time. Cache DNS results and round-robin multiple DNS providers. Crawling is I/O-bound, so a handful of network-optimized machines suffices for the 5-day target."},
  {id:"q1bh1", topic:"Design: Web Crawler", diff:"tricky", level:"Senior", type:"multi",
    q:"HI Web Crawler: which are part of being a 'polite' crawler? (select all)",
    options:["Parse and respect robots.txt (Disallow + Crawl-delay)","Rate-limit ~1 request/sec per domain (per-domain Redis SET NX lock)","Add jitter to avoid synchronized retries","Ignore robots.txt for faster coverage"],
    correct:[0,1,2],
    why:"HI: respect robots.txt including Crawl-delay, throttle per domain (~1 rps via a per-domain lock), and add jitter. Ignoring robots.txt is the opposite of polite."},
  {id:"qyykt", topic:"Design: Web Crawler", diff:"tricky", level:"Senior", type:"single",
    q:"HI Web Crawler: how do you avoid re-storing the same content and getting stuck in crawler traps?",
    options:["Crawl each URL only once ever","Dedupe by content hash (not just URL) and cap crawl depth (~15–20 hops from seed)","Limit total pages to 1M","Disable following links"],
    correct:[1],
    why:"HI: URL-level dedup misses mirror content, so also hash page content. Cap depth (hops from the seed, not path segments) to escape infinite trap pages."},

  // ---------- Design: Top K ----------
  {id:"q156k", topic:"Design: Top K", diff:"tricky", level:"Staff", type:"single",
    q:"HI Top-K: the headline data structure when exact counts can be relaxed to approximate is…",
    options:["A B-tree","A Count-Min Sketch (plus a heap for the top-K)","A bloom filter","A sorted set per video"],
    correct:[1],
    why:"HI: a Count-Min Sketch estimates per-item counts in megabytes instead of a hundreds-of-GB exact hash table; feed estimates into a heap to keep the top-K. Only valid when 'precise' is relaxed."},
  {id:"qoz3n", topic:"Design: Top K", diff:"tricky", level:"Senior", type:"single",
    q:"HI Top-K: 70B views/day (~700k TPS) far exceeds one DB. How do you keep results exact?",
    options:["Sample 1% of views","Ingest via Kafka, shard the counts across many DBs, compute each shard's top-K and merge","Round counts to the nearest thousand","Only count logged-in users"],
    correct:[1],
    why:"HI: buffer with Kafka and shard counters; each shard's local top-K, merged, is mathematically guaranteed to contain the global top-K — exact, without a single hot DB."},
  {id:"qpc0m", topic:"Design: Top K", diff:"tricky", level:"Senior", type:"single",
    q:"HI Top-K: why does HI restrict the problem to tumbling (non-overlapping) windows?",
    options:["Tumbling windows are less accurate, which is fine","Sliding windows are substantially harder to maintain; tumbling keeps aggregation tractable","Tumbling windows need no storage","Users only ask for sliding windows"],
    correct:[1],
    why:"HI: sliding windows require continuously re-aggregating overlapping ranges; tumbling windows let you keep simple per-window aggregates (precomputed/cached per minute)."},

  // ---------- Design: Rate Limiter ----------
  {id:"q16wy", topic:"Design: Rate Limiter", diff:"tricky", level:"Senior", type:"single",
    q:"HI Rate Limiter: why does a per-gateway in-memory counter fail?",
    options:["Memory is too expensive","The load balancer spreads a client's requests across gateways, so each sees only a fraction of the count — use a centralized Redis","In-memory counters aren't atomic","It only works for IP-based limits"],
    correct:[1],
    why:"HI: with traffic spread across gateway instances, no single instance has the true count. Centralize the counter in Redis (sharded by client key) so the limit is enforced globally."},
  {id:"q124l", topic:"Design: Rate Limiter", diff:"tricky", level:"Senior", type:"single",
    q:"HI Rate Limiter: how do you make the read-modify-write of a token bucket race-free in Redis?",
    options:["Hope requests don't collide","Run the check/refill/decrement as one atomic unit (MULTI/EXEC or a Lua script), plus EXPIRE to avoid leaks","Use two separate Redis calls","Lock the whole Redis instance"],
    correct:[1],
    why:"HI: bundle the HGET tokens / refill / HSET into an atomic transaction (or Lua) so concurrent requests can't both spend the last token; set EXPIRE so idle buckets don't leak memory."},
  {id:"qymk2", topic:"Design: Rate Limiter", diff:"tricky", level:"Senior", type:"single",
    q:"HI Rate Limiter: if the Redis backing the limiter goes down, does HI fail open or fail closed (for a social API)?",
    options:["Fail open — never block legitimate users","Fail closed — reject requests, because outages often coincide with spikes and failing open can collapse the backend","It doesn't matter","Shut down the whole service"],
    correct:[1],
    why:"HI calls both defensible but picks fail-closed for social media: limiter failures tend to coincide with traffic surges, so failing open could let a flood cascade into a backend collapse."},

  // ---------- Design: Google Docs ----------
  {id:"q1vxf", topic:"Design: Google Docs", diff:"tricky", level:"Staff", type:"single",
    q:"HI Google Docs: which concurrency-control approach does HI choose, and what's the alternative?",
    options:["Locks per paragraph; alternative is no locking","Operational Transformation (OT, what Google uses); CRDTs are the alternative for P2P/larger collaborator counts (e.g. Figma)","Two-phase commit; alternative is sagas","Last-write-wins; alternative is first-write-wins"],
    correct:[1],
    why:"HI: OT transforms concurrent INSERT/DELETE ops against each other on a central server so all clients converge — low memory, great for text. CRDTs suit peer-to-peer or very large collaboration but cost more memory."},
  {id:"q1igd", topic:"Design: Google Docs", diff:"tricky", level:"Senior", type:"single",
    q:"HI Google Docs: what should clients send over the WebSocket?",
    options:["The entire document on every keystroke","Edits as operations (e.g. INSERT/DELETE at a position)","A screenshot of the page","Only the final document on save"],
    correct:[1],
    why:"HI: transmit compact operations (insert/delete at offsets), not the whole doc — that's what OT transforms and what Cassandra stores append-only, partitioned by documentId."},
  {id:"qinys", topic:"Design: Google Docs", diff:"tricky", level:"Senior", type:"single",
    q:"HI Google Docs: how do you ensure all editors of one document hit the same WebSocket server at scale?",
    options:["Random load balancing","Consistent hashing by documentId, with ZooKeeper maintaining the hash ring; client connects via HTTP then upgrades to WS on the right server","Sticky sessions by user IP","A single global server"],
    correct:[1],
    why:"HI: route by documentId via consistent hashing so collaborators converge on one stateful server; ZooKeeper keeps the ring consistent as servers join/leave. Snapshot/compact operations to bound storage/transfer."},

  // ---------- Design: Payment System ----------
  {id:"qddm0", topic:"Design: Payment System", diff:"tricky", level:"Staff", type:"single",
    q:"HI Payment System: a request times out after charging. How do you avoid double-charging on retry?",
    options:["Assume the timeout means it failed and retry blindly","Idempotency keys, plus reconciliation against the payment network — never assume a timeout equals failure","Charge again and refund later","Block all retries"],
    correct:[1],
    why:"HI: a timeout is ambiguous (it may have succeeded). An idempotency key makes the retry a no-op if it already went through, and reconciliation against the network catches mismatches."},
  {id:"q1tjr", topic:"Design: Payment System", diff:"tricky", level:"Staff", type:"single",
    q:"HI Payment System: what storage approach gives the durability/audit trail payments require?",
    options:["Store only current state in a single table","Event sourcing: an append-only immutable event log (via CDC), not just current state","Daily CSV exports","Cache everything in Redis"],
    correct:[1],
    why:"HI: append-only event log is the foundation for audits, chargebacks, reconciliation and fraud detection — current-state-only loses the history regulators and disputes require."},
  {id:"q1e8a", topic:"Design: Payment System", diff:"tricky", level:"Senior", type:"single",
    q:"HI Payment System: how is raw card data handled for PCI compliance?",
    options:["Encrypt it in your primary DB","Tokenization — the card is exchanged for a token so your backend never stores/handles the raw card number","Hash it with SHA-256","Store it only in logs"],
    correct:[1],
    why:"HI: tokenize card data (e.g. via the provider's client-side SDK) so raw card numbers never reach your servers, keeping you out of PCI scope. Pair with API keys + request signing for security."},

  {id:"qev8x", topic:"Architecture", diff:"basic", level:"Mid", type:"single",
    q:"A requirement says 'users worldwide need fast loading of images and video'. Which component directly addresses it?",
    options:["A bigger primary database","A CDN caching static assets at edge locations","A message queue","A distributed lock"],
    correct:[1],
    why:"A CDN caches static content at edge locations close to users, cutting latency and offloading the origin — the standard answer for global static delivery.",
    more:"CDNs commonly sit in front of blob storage (S3): upload to S3 as origin, serve via CDN with signed URLs. They can also cache cacheable dynamic content/API responses.",
    src:"https://www.hellointerview.com/learn/system-design/in-a-hurry/key-technologies"},
  {id:"q1ri0", topic:"Architecture", diff:"basic", level:"Mid", type:"single",
    q:"A requirement says 'video encoding takes minutes and must not block the upload request'. Which pattern fits?",
    options:["Do it synchronously in the request","Ack immediately + push a job to a queue; a worker pool processes it in the background","Run it on the client","Cache the result"],
    correct:[1],
    why:"This is the Managing Long-Running Tasks pattern: validate + enqueue + return a job ID in milliseconds, while separate workers do the heavy processing.",
    more:"Don't queue SHORT jobs — synchronous responses give clearer back-pressure and simpler UX. Add job-status tracking, retries, and a dead-letter queue for poison messages.",
    src:"https://www.hellointerview.com/learn/system-design/patterns/long-running-tasks"},
  {id:"qrgx5", topic:"Architecture", diff:"tricky", level:"Senior", type:"single",
    q:"You need full-text search over millions of posts. Which component, and why not just the primary DB?",
    options:["Use SQL LIKE '%term%' on Postgres","Add Elasticsearch — an inverted index makes full-text search fast; LIKE forces a full table scan","Cache every query in Redis","Shard the primary DB harder"],
    correct:[1],
    why:"Full-text search needs an inverted index (term → documents). Elasticsearch is the go-to; a leading-wildcard LIKE can't use a B-tree index and scans the whole table.",
    more:"Keep your primary DB as the source of truth and sync ES as a secondary index via CDC — the search index lags slightly, which is fine for search. Postgres GIN can do lighter full-text in-DB.",
    src:"https://www.hellointerview.com/learn/system-design/deep-dives/elasticsearch"},

  // ---------- required subsystems per breakdown ----------
  {id:"q1dkn", topic:"Design: Bitly", diff:"basic", level:"Mid", type:"multi",
    q:"Which subsystems are essential for a URL shortener? (select all)",
    options:["A write/create service that generates the short code","A read/redirect service","A key-value store mapping short code → long URL","A cache (reads dominate ~1000:1)","A video transcoding pipeline"],
    correct:[0,1,2,3],
    why:"Bitly decomposes into a write path (generate unique code, store mapping), a read/redirect path, a KV store for the mapping, and a cache because reads vastly outnumber writes.",
    more:"Because write volume is tiny (~1/sec) and reads huge, the interesting work is fast redirects (cache/CDN) and unique code generation (counter + Base62), not the database choice — any DB works.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/bitly"},
  {id:"q2d9z", topic:"Design: Dropbox", diff:"basic", level:"Mid", type:"multi",
    q:"Which subsystems are essential for a file storage/sync service like Dropbox? (select all)",
    options:["Blob storage (S3) for file contents","A metadata database (files, versions, ownership)","A presigned-URL service for direct client upload/download","A sync/notification service to propagate changes","A full-text search cluster over file contents"],
    correct:[0,1,2,3],
    why:"Core pieces: blob storage for bytes, a metadata DB for file/version/share info, presigned URLs so clients transfer directly to S3, and a sync/notification path to keep devices consistent.",
    more:"Full-text search over contents isn't a core requirement of file sync — adding it would be scope creep unless asked. The hard parts are chunking (client-side), fingerprinting (SHA-256), and delta sync (content-defined chunking).",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/dropbox"},
  {id:"q1bet", topic:"Design: Ticketmaster", diff:"tricky", level:"Senior", type:"multi",
    q:"Which subsystems are essential for Ticketmaster? (select all)",
    options:["An event + search service (Elasticsearch) for browsing/finding events","A booking service backed by an ACID database (no double-booking)","A seat-reservation mechanism (distributed lock with TTL)","A payment integration","A real-time ML recommendation training pipeline"],
    correct:[0,1,2,3],
    why:"Ticketmaster needs search (ES), a transactional booking service (ACID prevents double-booking), a reservation hold (Redis lock w/ TTL), and payment integration.",
    more:"The ACID final write is what truly guarantees no double-book; the distributed lock is for UX (holding a seat ~10 min). For huge on-sales, add a virtual waiting queue — the staff-level move.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/ticketmaster"},
  {id:"q755g", topic:"Design: News Feed", diff:"tricky", level:"Senior", type:"multi",
    q:"Which subsystems are essential for a social news feed? (select all)",
    options:["A post service + post store","A follow/social-graph store (table + GSI for reverse lookups)","A feed-generation path (fan-out workers / precomputed feed)","A feed cache for hot reads","A distributed lock service"],
    correct:[0,1,2,3],
    why:"Feed systems need posts, the follow graph (with a reverse index), feed generation (fan-out on write/read or hybrid), and a feed cache.",
    more:"The signature decision is fan-out: precompute per-user feeds for normal accounts, pull at read time for celebrities, and merge (hybrid). A distributed lock isn't part of a feed.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/fb-news-feed"},
  {id:"q1glx", topic:"Design: WhatsApp", diff:"tricky", level:"Senior", type:"multi",
    q:"Which subsystems are essential for a chat app like WhatsApp? (select all)",
    options:["Stateful WebSocket chat servers (persistent connections)","A pub/sub routing layer to reach the right server (e.g. Redis Pub/Sub per user)","An inbox/message store for offline delivery","A presence/last-seen mechanism","An OLAP data warehouse for the core chat path"],
    correct:[0,1,2,3],
    why:"Chat needs persistent WebSocket servers, a routing layer so a message reaches whichever server holds the recipient's connection, durable inboxes for offline users, and presence.",
    more:"Redis Pub/Sub (topic per user) is HI's 'great' routing answer — it sidesteps consistent-hashing complexity. Pub/Sub is at-most-once, so durability comes from the inbox + acks + per-chat sequence numbers.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/whatsapp"},
  {id:"q27t0", topic:"Design: Uber", diff:"tricky", level:"Senior", type:"multi",
    q:"Which subsystems are essential for a ride-sharing service like Uber? (select all)",
    options:["A location service with a geospatial index (Redis geohashing)","A ride-matching service (with a lock to avoid double-dispatch)","A maps/ETA/fare integration","A push-notification service (APNs/FCM)","A full-text search cluster"],
    correct:[0,1,2,3],
    why:"Uber needs high-frequency location ingestion + proximity search (geospatial index), matching (with a lock so one driver isn't double-assigned), maps/fare, and notifications.",
    more:"Driver location at ~2M writes/sec rules out a disk DB — use an in-memory geospatial store (Redis geohashing). For the unresponsive-driver flow, durable execution (Temporal/Cadence) beats a fragile delay queue.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/uber"},
  {id:"q4vbu", topic:"Design: Ad Click Aggregator", diff:"tricky", level:"Staff", type:"multi",
    q:"Which subsystems are essential for a near-real-time ad click aggregator? (select all)",
    options:["A streaming ingestion layer (Kafka/Kinesis)","A stream processor for windowed aggregation (Flink)","An OLAP store for advertiser analytics queries","A data lake (S3) + batch (Spark) for reconciliation","A transactional RDBMS as the primary aggregation store"],
    correct:[0,1,2,3],
    why:"The pipeline is stream ingestion → Flink aggregation → OLAP for queries, plus a Lambda-architecture batch layer (S3 + Spark) to reconcile and serve as source of truth.",
    more:"Using one transactional DB for both ingest and analytics is the anti-pattern. The batch layer catches any loss/drift in the fast streaming path — a strong correctness signal.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/ad-click-aggregator"},
  {id:"q16u8", topic:"Design: Web Crawler", diff:"tricky", level:"Senior", type:"multi",
    q:"Which subsystems are essential for a large-scale web crawler? (select all)",
    options:["A frontier queue of URLs to fetch (SQS)","Fetcher workers + an extraction stage","Blob storage (S3) for raw HTML / extracted text","A metadata DB for dedup and crawl state","A DNS resolver with caching","A WebSocket server for clients"],
    correct:[0,1,2,3,4],
    why:"A crawler needs a frontier queue, fetch + extract workers, blob storage for content, a metadata DB (URL/content dedup + state), and DNS resolution (a real bottleneck).",
    more:"HI picks SQS (visibility timeout → easy backoff + DLQ) and keeps only the URL pointer in the queue, not raw HTML. DNS can be ~70% of per-thread time, so cache it and use multiple providers. A WebSocket server has no role here.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/web-crawler"},
  {id:"qe2tk", topic:"Design: Google Docs", diff:"tricky", level:"Staff", type:"multi",
    q:"Which subsystems are essential for a collaborative document editor? (select all)",
    options:["Stateful WebSocket document servers","A concurrency-control engine (Operational Transformation)","An append-only operations store (Cassandra)","Coordination for routing editors of one doc to one server (ZooKeeper-maintained hash ring)","A CDN to serve the live document"],
    correct:[0,1,2,3],
    why:"Real-time editing needs WebSocket servers, an OT engine to converge concurrent edits, an append-only ops store, and coordination (consistent hashing by docId via ZooKeeper) so collaborators share a server.",
    more:"Send edits as operations (insert/delete at position), not the whole doc. Periodically snapshot/compact operations to bound storage and join cost. A CDN serves static assets, not a live collaborative doc.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/google-docs"},
  {id:"qhome", topic:"Design: Payment System", diff:"tricky", level:"Staff", type:"multi",
    q:"Which subsystems are essential for a payment system like Stripe? (select all)",
    options:["An API gateway (auth, request signing)","A payment/intent service + database","A transaction service that talks to payment networks","An append-only event log (event sourcing) for audit + reconciliation","A full-text search cluster"],
    correct:[0,1,2,3],
    why:"Payments need a secure gateway, a payment-intent service + DB, a transaction service to external networks, and an immutable event log enabling audit, reconciliation, and chargebacks.",
    more:"Idempotency keys + reconciliation against the network are mandatory because async networks make a timeout ambiguous (never assume timeout = failure). Tokenize card data so raw PANs never hit your servers.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/payment-system"},

  {id:"q10sx", topic:"Architecture", diff:"basic", level:"Mid", type:"single",
    q:"Requirement: 'prevent abuse / DDoS before traffic reaches our services'. Which component and where?",
    options:["A cache in front of the DB","A rate limiter at the edge (API gateway), keyed per user/IP/API key","A read replica","A bigger load balancer"],
    correct:[1],
    why:"Put a rate limiter at the edge (API gateway/LB) so abusive traffic is rejected before it loads downstream services; key it per user/IP/API key for fairness.",
    more:"Token bucket is the usual algorithm (allows bursts up to bucket size). At scale the counter must be centralized (Redis), since per-instance counters each see only a fraction of a client's traffic.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/distributed-rate-limiter"},
  {id:"q11de", topic:"Architecture", diff:"tricky", level:"Senior", type:"single",
    q:"Requirement: 'hold a limited resource (seat, inventory) for a few minutes during checkout'. Which mechanism?",
    options:["A long-running DB transaction","A distributed lock with a TTL (e.g. Redis), auto-releasing on abandon","A read replica","A CDN"],
    correct:[1],
    why:"A distributed lock with a TTL holds the resource for a bounded time and auto-releases if the user abandons — the standard reservation pattern (Ticketmaster, Uber dispatch).",
    more:"Treat the lock as efficiency, not correctness: the authoritative no-oversell guarantee should come from an ACID write or a conditional UPDATE. For hard correctness use fencing tokens or a consensus store.",
    src:"https://www.hellointerview.com/learn/system-design/patterns/dealing-with-contention"},
  {id:"qltp4", topic:"Architecture", diff:"basic", level:"Mid", type:"single",

    options:["Short polling","Server-Sent Events (SSE)","WebSocket (full duplex)","A CDN"],
    correct:[2],
    why:"WebSocket gives full-duplex, low-latency bidirectional messaging over one persistent connection — right for chat/collaboration.",
    more:"SSE is one-way (server→client) and simpler — good for notifications/feeds. HI advises starting with HTTP polling and only moving to SSE/WebSocket when needed; WebSockets are stateful and need L4 LBs.",
    src:"https://www.hellointerview.com/learn/system-design/patterns/realtime-updates"},
  {id:"q1wrk", topic:"Architecture", diff:"tricky", level:"Senior", type:"single",
    q:"Requirement: 'store user-uploaded videos and serve them globally'. Which storage layout?",
    options:["Store video bytes as BLOBs in the primary DB","Store videos in blob storage (S3) + a CDN, keep only the URL/reference in the DB","Base64-encode videos into JSON rows","Keep videos only in Redis"],
    correct:[1],
    why:"Large binaries go in blob storage (S3) fronted by a CDN; the DB stores just the URL/reference. Binaries in the DB wreck index/cache efficiency and cost far more.",
    more:"Use presigned URLs for direct client upload/download (multipart for big files), and event notifications to sync DB metadata with the upload's completion.",
    src:"https://www.hellointerview.com/learn/system-design/patterns/large-blobs"},
  {id:"q1sjo", topic:"Architecture", diff:"tricky", level:"Senior", type:"single",
    q:"Requirement: 'advertisers run analytical queries (sums/group-bys) over billions of events with sub-second latency'. Which store?",
    options:["The transactional row store that ingests the events","An OLAP / columnar store (ClickHouse, Druid, BigQuery)","A key-value cache","Blob storage"],
    correct:[1],
    why:"Analytical aggregation over huge event volumes belongs in an OLAP/columnar store optimized for scans and group-bys — separate from the transactional ingest path.",
    more:"Pair it with pre-aggregated rollup tables (daily/weekly) to keep dashboard queries fast. Mixing OLTP ingest and OLAP queries in one store is the anti-pattern HI flags.",
    src:"https://www.hellointerview.com/learn/system-design/problem-breakdowns/ad-click-aggregator"},
  {id:"qbefs", topic:"Architecture", diff:"tricky", level:"Senior", type:"single",
    q:"Requirement: 'three independent teams must each process the same event stream their own way'. Which technology/feature?",
    options:["SQS, where the message is deleted after one consumer acks","Kafka with a separate consumer group per team (each tracks its own offset)","A single shared database table they poll and delete from","A distributed lock"],
    correct:[1],
    why:"Kafka retains the log and lets multiple consumer groups read it independently, each with its own offset — exactly the multi-consumer case.",
    more:"A broker queue (SQS/RabbitMQ) deletes on ack and suits single-consumer background work; it can't replay or fan a stream to independent consumers.",
    src:"https://www.hellointerview.com/learn/system-design/deep-dives/kafka"},
  {id:"q80ww", topic:"Architecture", diff:"tricky", level:"Senior", type:"single",
    q:"Requirement: 'find drivers/restaurants within N km, fast, over millions of entities'. Which component?",
    options:["A B-tree index on (lat, long)","A geospatial index (Redis geo, PostGIS, or ES geo-queries)","A full-text search","A CDN"],
    correct:[1],
    why:"Proximity search needs a geospatial index (geohash/quadtree-based) — a B-tree can't efficiently answer 2D radius queries.",
    more:"Geospatial indexes pay off at hundreds of thousands+ entities; for ~1,000 items a scan beats the index overhead. Queries are usually local to the user, not global.",
    src:"https://www.hellointerview.com/learn/system-design/patterns/realtime-updates"},
  {id:"q1a18", topic:"Architecture", diff:"tricky", level:"Senior", type:"single",

function sourceLabel(url){
  const seg = url.split("/learn/system-design/")[1] || "";
  const parts = seg.split("/");
  const sec = {"core-concepts":"Core Concept","deep-dives":"Key Technology","patterns":"Pattern","problem-breakdowns":"Breakdown","in-a-hurry":"Overview"}[parts[0]] || "HelloInterview";
  const name = (parts[1]||"").replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase());
  return name ? `HelloInterview · ${sec}: ${name}` : "HelloInterview";
}

/* ============================================================
   STORAGE
   ============================================================ */
const LS_KEY = "sdq_history_v1";
function loadStore(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || defaultStore(); }
  catch(e){ return defaultStore(); }
}
function defaultStore(){ return {topics:{}, sessions:[]}; }
function saveStore(s){ try{ localStorage.setItem(LS_KEY, JSON.stringify(s)); }catch(e){} }
let STORE = loadStore();

function topicStat(t){
  if(!STORE.topics[t]) STORE.topics[t] = {correct:0, total:0};
  return STORE.topics[t];
}
function recordAnswer(topic, correct){
  const ts = topicStat(topic);
  ts.total++; if(correct) ts.correct++;
}
function isWeak(t){
  const s = STORE.topics[t];
  if(!s || s.total < 3) return false;
  return (s.correct/s.total) < 0.6;
}
function allTopics(){
  return [...new Set(QUESTIONS.map(q=>q.topic))].sort();
}

/* ============================================================
   SETUP VIEW
   ============================================================ */
const selectedTopics = new Set(allTopics());
const topicChipsEl = document.getElementById("topicChips");

function topicCount(t){ return QUESTIONS.filter(q=>q.topic===t).length; }

function renderTopicChips(){
  topicChipsEl.innerHTML = "";
  allTopics().forEach(t=>{
    const c = document.createElement("div");
    c.className = "chip" + (selectedTopics.has(t) ? " on":"");
    const weak = isWeak(t);
    c.innerHTML = `${weak?'⚠️ ':''}${t} <span class="ct">${topicCount(t)}</span>`;
    if(weak) c.title = "Weak topic — accuracy below 60%";
    c.onclick = ()=>{
      if(selectedTopics.has(t)) selectedTopics.delete(t); else selectedTopics.add(t);
      renderTopicChips(); updatePoolInfo();
    };
    topicChipsEl.appendChild(c);
  });
}
document.getElementById("selAll").onclick = ()=>{ allTopics().forEach(t=>selectedTopics.add(t)); renderTopicChips(); updatePoolInfo(); };
document.getElementById("selNone").onclick = ()=>{ selectedTopics.clear(); renderTopicChips(); updatePoolInfo(); };
document.getElementById("selWeak").onclick = ()=>{
  const weak = allTopics().filter(isWeak);
  selectedTopics.clear();
  if(weak.length){ weak.forEach(t=>selectedTopics.add(t)); }
  else { allTopics().forEach(t=>selectedTopics.add(t)); alert("No weak topics yet (need ≥3 answers & <60%). Selected all."); }
  renderTopicChips(); updatePoolInfo();
};

function matchingPool(){
  const diff = document.getElementById("diffSel").value;
  const level = document.getElementById("levelSel").value;
  return QUESTIONS.filter(q=> selectedTopics.has(q.topic)
    && (diff==="all"||q.diff===diff)
    && (level==="all"||q.level===level));
}
function updatePoolInfo(){
  const n = matchingPool().length;
  document.getElementById("poolInfo").textContent = `${n} question${n!==1?'s':''} in pool`;
  document.getElementById("startBtn").disabled = n===0;
}
document.getElementById("diffSel").onchange = updatePoolInfo;
document.getElementById("levelSel").onchange = updatePoolInfo;

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
let session = null;

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startQuiz(pool){
  let qs = pool.slice();
  if(document.getElementById("shuffleChk").checked) qs = shuffle(qs);
  const len = parseInt(document.getElementById("lenSel").value,10);
  if(len>0) qs = qs.slice(0,len);
  // shuffle option order per question while tracking correct indices
  qs = qs.map(q=>{
    const idx = q.options.map((_,i)=>i);
    const order = document.getElementById("shuffleChk").checked ? shuffle(idx) : idx;
    return {
      ...q,
      _opts: order.map(i=>q.options[i]),
      _correct: order.map((orig,newPos)=> q.correct.includes(orig)?newPos:-1).filter(x=>x>=0),
    };
  });
  session = {qs, i:0, picks:[], results:[], answered:[]};
  show("quiz");
  renderQ();
}

function renderQ(){
  const s = session, q = s.qs[s.i];
  if(!s.picks[s.i]) s.picks[s.i] = new Set();
  const picks = s.picks[s.i];
  const answered = s.answered[s.i];
  document.getElementById("progFill").style.width = ((s.i)/s.qs.length*100)+"%";

  const isMulti = q.type==="multi";
  let html = `
    <div class="qtop">
      <div class="qmeta">
        <span class="tag topic">${q.topic}</span>
        <span class="tag lvl-${q.level}" title="Seniority level at which this answer is expected">${q.level}</span>
        <span class="tag ${q.diff==='tricky'?'tricky':''}">${q.diff}</span>
        <span class="tag">${isMulti?'multi-select':'single'}</span>
      </div>
      <span class="muted">Q ${s.i+1} / ${s.qs.length} · <span style="opacity:.6" title="question id (for debugging)">#${q.id}</span></span>
    </div>
    <div class="qtext">${q.q}</div>
    ${isMulti?'<div class="multi-note">Select all that apply</div>':''}
    <div id="opts">`;
  q._opts.forEach((opt,i)=>{
    let cls = "opt " + (isMulti?"":"radio");
    let badge = "";
    if(answered){
      cls += " locked";
      const correct = q._correct.includes(i);
      const picked = picks.has(i);
      if(correct){ cls+=" correct"; badge="✓"; }
      else if(picked){ cls+=" wrong"; badge="✕"; }
    } else if(picks.has(i)){ cls+=" sel"; badge = isMulti?"✓":"●"; }
    html += `<div class="${cls}" data-i="${i}"><div class="box">${badge}</div><div>${opt}</div></div>`;
  });
  html += `</div>`;
  // feedback
  const srcUrl = sourceFor(q);
  html += `<div class="feedback ${answered?(answered.correct?'good show':'bad show'):''}" id="fb">
    <b>${answered? (answered.correct?'✅ Correct':'❌ Not quite') : ''}</b>
    <span class="why">${answered? q.why : ''}</span>
    ${answered && q.more ? `<div class="more">${q.more}</div>` : ''}
    ${answered ? `<div class="src">📖 Source: <a href="${srcUrl}" target="_blank" rel="noopener">${sourceLabel(srcUrl)}</a></div>` : ''}
  </div>`;
  document.getElementById("qCard").innerHTML = html;

  // option clicks
  if(!answered){
    document.querySelectorAll("#opts .opt").forEach(el=>{
      el.onclick = ()=>{
        const i = parseInt(el.dataset.i,10);
        if(isMulti){ picks.has(i)?picks.delete(i):picks.add(i); }
        else { picks.clear(); picks.add(i); }
        renderQ();
      };
    });
  }

  // buttons
  document.getElementById("checkBtn").classList.toggle("hide", !!answered);
  document.getElementById("checkBtn").disabled = picks.size===0;
  document.getElementById("nextBtn").disabled = !answered;
  document.getElementById("nextBtn").textContent = (s.i===s.qs.length-1)?"Finish ✓":"Next →";
}

document.getElementById("checkBtn").onclick = ()=>{
  const s = session, q = s.qs[s.i], picks = s.picks[s.i];
  if(picks.size===0) return;
  const correctSet = new Set(q._correct);
  const isCorrect = picks.size===correctSet.size && [...picks].every(p=>correctSet.has(p));
  s.answered[s.i] = {correct:isCorrect};
  s.results[s.i] = {topic:q.topic, correct:isCorrect};
  recordAnswer(q.topic, isCorrect);
  saveStore(STORE);
  renderQ();
};

document.getElementById("nextBtn").onclick = ()=>{
  const s = session;
  if(s.i < s.qs.length-1){ s.i++; renderQ(); }
  else finishQuiz();
};
document.getElementById("quitBtn").onclick = ()=>{ if(confirm("Quit this session? Answered questions are already saved.")) backToSetup(); };

function finishQuiz(){
  const s = session;
  const answered = s.results.filter(Boolean);
  const correct = answered.filter(r=>r.correct).length;
  const total = answered.length;
  // per-topic this session
  const byTopic = {};
  answered.forEach(r=>{ (byTopic[r.topic]=byTopic[r.topic]||{c:0,t:0}); byTopic[r.topic].t++; if(r.correct)byTopic[r.topic].c++; });
  // save session summary
  STORE.sessions.unshift({date:Date.now(), correct, total, topics:Object.keys(byTopic)});
  STORE.sessions = STORE.sessions.slice(0,50);
  saveStore(STORE);

  document.getElementById("progFill").style.width = "100%";
  const pct = total? Math.round(correct/total*100):0;
  document.getElementById("resStats").innerHTML = `
    <div class="stat"><div class="n">${correct}/${total}</div><div class="l">Correct</div></div>
    <div class="stat"><div class="n" style="color:${pct>=80?'var(--ok)':pct>=60?'var(--warn)':'var(--bad)'}">${pct}%</div><div class="l">Accuracy</div></div>
    <div class="stat"><div class="n">${Object.keys(byTopic).length}</div><div class="l">Topics</div></div>`;
  let tHtml = "";
  Object.entries(byTopic).sort((a,b)=> (a[1].c/a[1].t)-(b[1].c/b[1].t)).forEach(([t,o])=>{
    const p = Math.round(o.c/o.t*100);
    const col = p>=80?'var(--ok)':p>=60?'var(--warn)':'var(--bad)';
    tHtml += `<div class="bar-row"><div class="name">${t}</div>
      <div class="track"><div class="fill" style="width:${p}%;background:${col}"></div></div>
      <div class="pct">${o.c}/${o.t} · ${p}%</div></div>`;
  });
  document.getElementById("resTopics").innerHTML = tHtml || '<span class="muted">No answers recorded.</span>';
  show("result");
}

document.getElementById("againBtn").onclick = backToSetup;
document.getElementById("retryWeakBtn").onclick = ()=>{
  backToSetup();
  document.getElementById("selWeak").click();
};

/* ============================================================
   STATS VIEW
   ============================================================ */
function renderStats(){
  let tot=0, cor=0;
  Object.values(STORE.topics).forEach(s=>{ tot+=s.total; cor+=s.correct; });
  const weakCount = allTopics().filter(isWeak).length;
  const pct = tot? Math.round(cor/tot*100):0;
  document.getElementById("allStats").innerHTML = `
    <div class="stat"><div class="n">${tot}</div><div class="l">Answered</div></div>
    <div class="stat"><div class="n" style="color:${pct>=80?'var(--ok)':pct>=60?'var(--warn)':'var(--bad)'}">${pct}%</div><div class="l">Accuracy</div></div>
    <div class="stat"><div class="n">${STORE.sessions.length}</div><div class="l">Sessions</div></div>
    <div class="stat"><div class="n" style="color:${weakCount?'var(--bad)':'var(--ok)'}">${weakCount}</div><div class="l">Weak topics</div></div>`;

  // topic bars (all topics, even unattempted)
  let bars = "";
  allTopics().map(t=>{
    const s = STORE.topics[t] || {correct:0,total:0};
    const p = s.total? Math.round(s.correct/s.total*100) : 0;
    return {t, s, p, weak:isWeak(t)};
  }).sort((a,b)=>{
    if(a.s.total===0 && b.s.total>0) return 1;
    if(b.s.total===0 && a.s.total>0) return -1;
    return a.p-b.p;
  }).forEach(({t,s,p,weak})=>{
    const col = s.total===0?'var(--line)': p>=80?'var(--ok)':p>=60?'var(--warn)':'var(--bad)';
    bars += `<div class="bar-row">
      <div class="name ${weak?'weak':''}">${weak?'⚠️ ':''}${t}</div>
      <div class="track"><div class="fill" style="width:${s.total?p:0}%;background:${col}"></div></div>
      <div class="pct">${s.total? s.correct+'/'+s.total+' · '+p+'%' : '—'}</div></div>`;
  });
  document.getElementById("topicBars").innerHTML = bars;

  // history
  let h = "";
  if(STORE.sessions.length===0) h = '<span class="muted">No sessions yet.</span>';
  STORE.sessions.forEach(se=>{
    const d = new Date(se.date);
    const p = se.total? Math.round(se.correct/se.total*100):0;
    const col = p>=80?'var(--ok)':p>=60?'var(--warn)':'var(--bad)';
    h += `<div class="hist-item">
      <span>${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
        <span class="muted">· ${se.topics.length} topic${se.topics.length!==1?'s':''}</span></span>
      <span style="color:${col};font-weight:600">${se.correct}/${se.total} · ${p}%</span></div>`;
  });
  document.getElementById("histList").innerHTML = h;
}
document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("Erase ALL history and topic stats? This can't be undone.")){
    STORE = defaultStore(); saveStore(STORE);
    renderStats(); renderTopicChips();
  }
};

/* ============================================================
   VIEW ROUTING
   ============================================================ */
function show(view){
  ["setup","quiz","result","stats"].forEach(v=>{
    document.getElementById("view-"+v).classList.toggle("hide", v!==view);
  });
  const onStats = view==="stats";
  document.getElementById("tab-quiz").className = "btn " + (onStats?"ghost":"sec");
  document.getElementById("tab-stats").className = "btn " + (onStats?"sec":"ghost");
}
function backToSetup(){ renderTopicChips(); updatePoolInfo(); show("setup"); }

document.getElementById("tab-quiz").onclick = backToSetup;
document.getElementById("tab-stats").onclick = ()=>{ renderStats(); show("stats"); };
document.getElementById("startBtn").onclick = ()=>{
  const pool = matchingPool();
  if(pool.length===0){ alert("No questions match — pick more topics or change difficulty."); return; }
  startQuiz(pool);
};

/* init */
renderTopicChips();
updatePoolInfo();
show("setup");
</script>
</body>
</html>
